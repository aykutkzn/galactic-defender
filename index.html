<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Galactic Defender</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;font-family:'Courier New',monospace;overflow:hidden;touch-action:none;}
#ui{color:#0ff;font-size:12px;display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;padding:4px 10px;}
#pauseBtn{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);border-radius:4px;color:#0ff;font-size:11px;padding:2px 6px;cursor:pointer;user-select:none;}
canvas{display:block;touch-action:none;image-rendering:pixelated;}
#controls{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;padding:8px 16px;}
#jWrap{position:relative;width:110px;height:110px;}
#jBase{width:110px;height:110px;border-radius:50%;background:rgba(0,255,255,.07);border:2px solid rgba(0,255,255,.2);position:absolute;}
#jKnob{width:44px;height:44px;border-radius:50%;background:rgba(0,255,255,.28);border:2px solid #0ff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#fireBtn{width:78px;height:78px;border-radius:50%;background:rgba(255,50,50,.2);border:2px solid #f55;color:#f55;font-size:24px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;}
#fireBtn:active{background:rgba(255,50,50,.45);}
</style>
</head>
<body>
<div id="ui">
  <span>⭐<b id="sEl">0</b></span>
  <span>🌊<b id="wEl">1/15</b></span>
  <span id="lEl">❤️❤️❤️</span>
  <button id="pauseBtn">⏸</button>
</div>
<canvas id="c"></canvas>
<div id="controls">
  <div id="jWrap"><div id="jBase"></div><div id="jKnob"></div></div>
  <button id="fireBtn">🔥</button>
</div>
<script>
// ── CANVAS ──────────────────────────────────────────────────────
// hex color + alpha helper — handles #rgb and #rrggbb
function ca(hex,a){
  if(hex.length===4){var r=parseInt(hex[1]+hex[1],16),g=parseInt(hex[2]+hex[2],16),b=parseInt(hex[3]+hex[3],16);return 'rgba('+r+','+g+','+b+','+a+')';}
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';
}
var C=document.getElementById('c'),X=C.getContext('2d');
X.imageSmoothingEnabled=false;
function resize(){
  var uH=document.getElementById('ui').offsetHeight;
  var cH=document.getElementById('controls').offsetHeight;
  var av=window.innerHeight-uH-cH-10;
  var mw=Math.min(window.innerWidth,480);
  var h=Math.min(av,mw*1.3),w=Math.min(mw,h/1.3);
  C.width=Math.floor(w);C.height=Math.floor(h);
  C.style.width=C.width+'px';C.style.height=C.height+'px';
}
resize();
window.addEventListener('resize',function(){resize();initStars();});
function W(){return C.width;}
function H(){return C.height;}
function PX(){return Math.max(2,Math.floor(W()/80));}
function pr(x,y,w,h,col){X.fillStyle=col;X.fillRect(Math.floor(x),Math.floor(y),w,h);}

// ── AUDIO ────────────────────────────────────────────────────────
var _ac=null,bgGain=null,bgOn=false,musicOn=true;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function toggleMusic(){musicOn=!musicOn;if(bgGain)bgGain.gain.value=musicOn?1:0;}
function tn(f,v,d,tp,delay){try{var a=AC(),t=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();o.type=tp||'square';o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d);}catch(e){}}
function sShoot(){tn(700,.08,.07,'square');}
function sHit(){tn(110,.2,.2,'sawtooth');}
function sPop(big){try{var a=AC(),len=a.sampleRate*(big?.5:.18),buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);var s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=big?250:700;s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(big?.6:.28,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+(big?.5:.18));s.start();s.stop(a.currentTime+(big?.5:.18));}catch(e){}}
function sPU(){[523,659,784,1047].forEach(function(f,i){tn(f,.12,.09,'sine',i*.06);});}
function sBossIn(){tn(80,.5,.7,'sawtooth');tn(60,.5,.7,'sawtooth',.35);tn(40,.7,1,'sawtooth',.7);}
function sBossPhase(){tn(55,.4,.5,'sawtooth');tn(80,.3,.4,'sawtooth',.2);}
function sBossDead(){for(var i=0;i<4;i++)(function(ii){setTimeout(function(){sPop(true);tn(30+ii*10,.5,.6,'sawtooth');},ii*150);})(i);}
function bossExplode(x,y,col){
  // sahneyi temizle
  eBullets=[];bullets=[];pups=[];
  phase='bossExploding';
  // Büyük patlama: çok sayıda parçacık
  for(var i=0;i<40;i++){
    var a=Math.random()*Math.PI*2,spd=Math.random()*6+1;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:50+Math.random()*30,
      col:[col,'#fff','#ff0','#f80','#f55'][Math.floor(Math.random()*5)],
      r:PX()*(Math.random()*3+1)});
  }
  // 3 genişleyen halka dalgası
  for(var w=0;w<3;w++)(function(wi){
    setTimeout(function(){
      for(var i=0;i<16;i++){
        var a=i*(Math.PI/8);
        parts.push({x:x,y:y,vx:Math.cos(a)*(4+wi*1.5),vy:Math.sin(a)*(4+wi*1.5),
          life:22,col:wi===0?'#fff':wi===1?col:'#ff0',r:PX()*1.5});
      }
    },wi*120);
  })(w);
  // Parlak merkez patlaması
  for(var i=0;i<14;i++){
    var a=Math.random()*Math.PI*2,spd2=Math.random()*10+3;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd2,vy:Math.sin(a)*spd2,
      life:30+Math.random()*15,col:'#fff',r:PX()*(Math.random()*2+1.5)});
  }
}
function sWin(){tn(523,.3,.2,'sine');tn(659,.3,.2,'sine',.15);tn(784,.3,.2,'sine',.3);tn(1047,.4,.6,'sine',.45);}
function startMusic(){
  if(bgOn)return;bgOn=true;
  try{
    var a=AC();bgGain=a.createGain();bgGain.gain.value=musicOn?1:0;bgGain.connect(a.destination);
    var bass=a.createOscillator(),bg=a.createGain();bass.type='sawtooth';bass.frequency.value=55;bg.gain.value=.04;bass.connect(bg);bg.connect(bgGain);bass.start();
    var melody=[261,311,349,392,466,392,349,311,261,261,311,349,392,349,311,261,349,392,466,523,466,392,349,311,261,311,349,261,261,0,311,349];
    var bass2=[130,130,155,174,196,174,155,130,130,130,155,174,196,174,155,130,174,196,233,261,233,196,174,155,130,155,174,130,130,0,155,174];
    var si=0;
    (function step(){if(!bgOn)return;
      var note=melody[si%32],b2=bass2[si%32];
      if(note>0){try{var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=note;g.gain.setValueAtTime(.055,a.currentTime);g.gain.setValueAtTime(.035,a.currentTime+.05);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.11);o.connect(g);g.connect(bgGain);o.start(a.currentTime);o.stop(a.currentTime+.12);}catch(e){}}
      if(b2>0){try{var ob=a.createOscillator(),gb=a.createGain();ob.type='triangle';ob.frequency.value=b2;gb.gain.setValueAtTime(.03,a.currentTime);gb.gain.exponentialRampToValueAtTime(.001,a.currentTime+.1);ob.connect(gb);gb.connect(bgGain);ob.start(a.currentTime);ob.stop(a.currentTime+.11);}catch(e){}}
      si++;setTimeout(step,120);})();
  }catch(e){}
}

// ── JOYSTICK ─────────────────────────────────────────────────────
var JB=document.getElementById('jBase'),JK=document.getElementById('jKnob');
var jOn=false,jId=null,jOx=0,jOy=0;
var K={l:false,r:false,u:false,d:false,f:false};
function jSt(cx,cy){var r=JB.getBoundingClientRect();jOx=r.left+r.width/2;jOy=r.top+r.height/2;jOn=true;jMv(cx,cy);}
function jMv(cx,cy){if(!jOn)return;var dx=cx-jOx,dy=cy-jOy,ds=Math.sqrt(dx*dx+dy*dy);if(ds>38){dx=dx/ds*38;dy=dy/ds*38;}JK.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';K.l=dx<-8;K.r=dx>8;K.u=dy<-8;K.d=dy>8;}
function jEn(){jOn=false;jId=null;JK.style.transform='translate(-50%,-50%)';K.l=K.r=K.u=K.d=false;}
JB.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];jId=t.identifier;jSt(t.clientX,t.clientY);},{passive:false});
JB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier===jId)jMv(t.clientX,t.clientY);}},{passive:false});
JB.addEventListener('touchend',function(e){e.preventDefault();jEn();},{passive:false});
JB.addEventListener('mousedown',function(e){jId='m';jSt(e.clientX,e.clientY);});
window.addEventListener('mousemove',function(e){if(jId==='m')jMv(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){if(jId==='m')jEn();});
var FB=document.getElementById('fireBtn');
FB.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();K.f=true;go();},{passive:false});
FB.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();K.f=false;});
FB.addEventListener('touchcancel',function(e){e.preventDefault();K.f=false;});
FB.addEventListener('mousedown',function(e){e.preventDefault();K.f=true;go();});
FB.addEventListener('mouseup',function(){K.f=false;});
C.addEventListener('touchstart',function(e){var t=e.changedTouches[0];handleCanvasTap(t.clientX,t.clientY);},{passive:true});
C.addEventListener('mousedown',function(e){handleCanvasTap(e.clientX,e.clientY);});
function handleCanvasTap(cx,cy){
  var r=C.getBoundingClientRect(),x=(cx-r.left)*(W()/r.width),y=(cy-r.top)*(H()/r.height);
  if(state==='start'){
    var bs=Math.floor(W()/32),lh=bs*2.1,by=H()*.34+lh*6.3+lh*1.2;
    if(x>W()/2-65&&x<W()/2+65&&y>by&&y<by+28)toggleMusic();
  }
  if(state==='win'&&winTimer>160){
    var bx=W()/2-90,by2=H()*.88,bw=180,bh=PX()*7;
    if(x>bx&&x<bx+bw&&y>by2&&y<by2+bh){resetAll();state='start';}
  }
}
var paused=false,PB=document.getElementById('pauseBtn');
PB.addEventListener('click',function(){if(state==='play'){paused=!paused;PB.textContent=paused?'▶':'⏸';}});
PB.addEventListener('touchstart',function(e){e.preventDefault();if(state==='play'){paused=!paused;PB.textContent=paused?'▶':'⏸';}},{passive:false});

// ── STARS + PLANETS ──────────────────────────────────────────────
var stars=[],planets=[];
function initStars(){
  stars=[];
  for(var i=0;i<90;i++)stars.push({x:Math.random()*W(),y:Math.random()*H(),s:Math.random()<.25?2:1,sp:Math.random()*.6+.2,tw:Math.random()*60});
  planets=[];
  var pd=[{col:'#4a6fa5',r:18,sp:.08,ring:false},{col:'#c8814a',r:12,sp:.12,ring:false},{col:'#9b6b9b',r:22,sp:.06,ring:true},{col:'#4a9b6b',r:10,sp:.15,ring:false}];
  for(var i=0;i<pd.length;i++)planets.push({x:Math.random()*W(),y:Math.random()*H(),r:pd[i].r,col:pd[i].col,sp:pd[i].sp,ring:pd[i].ring});
}
initStars();
function drawStars(){
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    X.fillStyle='rgba(255,255,255,'+(0.18+0.28*Math.abs(Math.sin(s.tw/60*Math.PI)))+')';
    X.fillRect(Math.floor(s.x),Math.floor(s.y),s.s,s.s);
  }
  for(var i=0;i<planets.length;i++){
    var pl=planets[i];
    X.save();X.shadowBlur=pl.r*.8;X.shadowColor=ca(pl.col,0.53);
    X.fillStyle=ca(pl.col,0.27);X.beginPath();X.arc(pl.x,pl.y,pl.r*1.4,0,Math.PI*2);X.fill();
    X.fillStyle=pl.col;X.beginPath();X.arc(pl.x,pl.y,pl.r,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,.18)';X.beginPath();X.arc(pl.x-pl.r*.28,pl.y-pl.r*.28,pl.r*.45,0,Math.PI*2);X.fill();
    if(pl.ring){X.shadowBlur=0;X.strokeStyle=ca(pl.col,0.53);X.lineWidth=2;X.beginPath();X.ellipse(pl.x,pl.y,pl.r*2,pl.r*.4,Math.PI/6,0,Math.PI*2);X.stroke();}
    X.shadowBlur=0;X.restore();
  }
}
function drawCRT(){
  X.save();X.globalAlpha=.03;X.fillStyle='#000';
  for(var y=0;y<H();y+=4)X.fillRect(0,y,W(),2);
  X.globalAlpha=1;
  var vg=X.createRadialGradient(W()/2,H()/2,H()*.22,W()/2,H()/2,H()*.88);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.48)');
  X.fillStyle=vg;X.fillRect(0,0,W(),H());X.restore();
}

// ── GAME DATA ─────────────────────────────────────────────────────
var MAX_WAVE=15;
var state='start',score=0,lives=3,wave=1;
var combo=0,cTimer=0,warpT=0;
// phase: idle | countdown | bossIntro | playing | bossPlaying | clearing
var phase='idle',phTimer=0,cdN=0;

// boss intro state — simple counter
var introActive=false,introT=0,introCfg=null;

// win state
var winTimer=0,winParts=[];

var P={};
function resetP(){P={x:W()/2,y:H()-60,w:30,h:32,spd:1.1,inv:0,shld:0};}
resetP();

var bullets=[],eBullets=[],enemies=[],parts=[],pups=[],floats=[];
var boss=null,bDir=1,sCool=0,rTimer=0,xTimer=0,rocketReady=0,rockets=[];

// ── WAVE DEFS ─────────────────────────────────────────────────────
var WAVE_DEFS=[
  {rows:[{t:'A',n:6}]},{rows:[{t:'A',n:8}]},{rows:[{t:'A',n:5},{t:'B',n:3}]},
  {rows:[{t:'B',n:6}]},{boss:true},{rows:[{t:'B',n:4},{t:'C',n:4}]},
  {rows:[{t:'C',n:8}]},{rows:[{t:'A',n:4},{t:'C',n:4},{t:'B',n:4}]},
  {rows:[{t:'D',n:6}]},{boss:true},{rows:[{t:'B',n:4},{t:'D',n:4}]},
  {rows:[{t:'C',n:5},{t:'D',n:5}]},{rows:[{t:'A',n:3},{t:'B',n:3},{t:'C',n:3},{t:'D',n:3}]},
  {rows:[{t:'D',n:8}]},{boss:true},
];
var ETYPES={
  A:{col:'#4af',hp:2,pts:10,brate:140,bspd:.9,mv:'side'},
  B:{col:'#f55',hp:3,pts:20,brate:100,bspd:1.1,mv:'side'},
  C:{col:'#b0f',hp:2,pts:15,brate:120,bspd:1.0,mv:'zigzag'},
  D:{col:'#ff0',hp:2,pts:18,brate:90, bspd:1.2,mv:'dive'},
};
var BOSSES=[
  {name:'WARDEN', col:'#f80',hp:25,design:'dragon', pattern:'spiral'},
  {name:'CRUSHER',col:'#f0f',hp:40,design:'spider', pattern:'wave'},
  {name:'NEMESIS',col:'#ff0',hp:38,design:'vortex', pattern:'cross'},
];
function getBoss(w){
  var idx=w<=5?0:w<=10?1:2;
  var b=BOSSES[idx],tier=Math.ceil(w/5);
  return{name:b.name,col:b.col,hp:Math.floor(b.hp*(1+(tier-1)*.5)),maxHp:Math.floor(b.hp*(1+(tier-1)*.5)),design:b.design,pattern:b.pattern};
}

// ── PARTICLES ─────────────────────────────────────────────────────
function burst(x,y,col,n,spd){n=n||7;spd=spd||3;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=Math.random()*spd+.7;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*14,col:col,r:Math.random()*2+.8});}}
function ring(x,y,col,n){n=n||10;for(var i=0;i<n;i++){var a=i*(Math.PI*2/n);parts.push({x:x,y:y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:12,col:'#fff',r:1.8});}burst(x,y,col,7,3);}
function ft(x,y,txt,col){floats.push({x:x,y:y,txt:txt,col:col,life:60,vy:-.7});}

// ── SPAWN ─────────────────────────────────────────────────────────
function spawnWave(w){
  enemies=[];boss=null;eBullets=[];bullets=[];rockets=[];
  var def=WAVE_DEFS[Math.min(w-1,WAVE_DEFS.length-1)];
  if(def.boss){
    // set up intro — this is the ONLY place introActive becomes true
    introCfg=getBoss(w);
    introT=300; // 300 frames = ~5 seconds
    introActive=true;
    phase='bossIntro';
    sBossIn();
    return;
  }
  var rows=def.rows;
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri],n=row.n,et=ETYPES[row.t];
    var spacing=Math.min((W()-60)/n,52);
    var startX=(W()-(n-1)*spacing)/2;
    for(var ci=0;ci<n;ci++){
      var tx=startX+ci*spacing,ty=40+ri*46,sy=-60-ri*60-ci*6;
      enemies.push({x:tx,y:sy,tx:tx,ty:ty,w:26,h:22,
        hp:et.hp+Math.floor((w-1)/3),maxHp:et.hp+Math.floor((w-1)/3),
        type:row.t,col:et.col,pts:et.pts,mv:et.mv,
        brate:Math.max(80,et.brate-w*2),bspd:Math.min(1.8,et.bspd+w*.025),
        st:et.brate+ci*25+ri*80,
        dx:(Math.random()<.5?.5:-.5),zd:1,zt:0,ang:0,entering:true,divePhase:0});
    }
  }
  phase='playing';
}
function spawnBoss(){
  var cfg=introCfg;
  boss={name:cfg.name,col:cfg.col,hp:cfg.hp,mhp:cfg.maxHp,
    design:cfg.design,pattern:cfg.pattern,
    x:W()/2,y:-90,w:72,h:56,
    st:80,sa:0,lc:0,la:false,lx:0,lt:0,ph:1,rot:0,
    entering:true,webTimer:0,tick:0};
  introActive=false;
  bDir=1;
  phase='bossPlaying';
}

// ── SHIP ──────────────────────────────────────────────────────────
function drawShip(){
  var p=PX(),x=Math.floor(P.x),y=Math.floor(P.y);
  X.save();X.translate(x,y);
  var fl=Math.floor(Date.now()/80)%2;
  X.fillStyle='rgba(0,200,255,.4)';X.fillRect(-p,p*4,p*2,p*2);
  X.fillStyle='#0ff';X.fillRect(-p/2,p*4+(fl?p:0),p,p);
  X.fillStyle='#4af';X.fillRect(-p,-p*4,p*2,p*8);X.fillRect(-p*2,-p*2,p*4,p*4);X.fillRect(-p*2,-p*3,p,p);X.fillRect(p,-p*3,p,p);
  X.fillStyle='#bef';X.fillRect(-p/2,-p*3,p,p*2);
  X.fillStyle='#38a';X.fillRect(-p*4,p,p*2,p*3);X.fillRect(p*2,p,p*2,p*3);
  X.fillStyle='#4af';X.fillRect(-p*4,p*3,p,p);X.fillRect(p*3,p*3,p,p);
  if(P.shld>0){X.strokeStyle='rgba(0,255,255,'+(0.3+0.3*Math.sin(Date.now()/90))+')';X.lineWidth=p*.8;X.beginPath();X.arc(0,0,p*5,0,Math.PI*2);X.stroke();}
  X.restore();
}

// ── ENEMIES ───────────────────────────────────────────────────────
function drawEnemySprite(e){
  var p=PX(),x=Math.floor(e.x),y=Math.floor(e.y),c=e.col,fl=Math.floor(Date.now()/160)%2;
  if(e.type==='A'){
    pr(x-p*3,y+p,p*6,p*2,c);pr(x-p*4,y+p*2,p*8,p,c);
    pr(x-p*2,y-p,p*4,p*2,'#aef');pr(x-p,y-p*2,p*2,p,'#dff');
    pr(x-p*3,y+p*2,p,p,fl?'#ff0':'#f80');pr(x,y+p*2,p,p,fl?'#f00':'#ff0');pr(x+p*2,y+p*2,p,p,fl?'#0f0':'#f00');
  }else if(e.type==='B'){
    pr(x-p,y-p*3,p*2,p*6,c);pr(x-p*2,y-p,p*4,p*2,c);
    pr(x-p*4,y,p*2,p*2,c);pr(x+p*2,y,p*2,p*2,c);
    pr(x-p*5,y+p,p,p,c);pr(x+p*4,y+p,p,p,c);
    pr(x-p/2,y-p*2,p,p*2,fl?'#ff8':'#fa0');
  }else if(e.type==='C'){
    e.ang=(e.ang||0)+.055;
    X.save();X.translate(x,y);X.rotate(e.ang);
    pr(-p*3,-p,p*6,p*2,c);pr(-p,-p*3,p*2,p*6,c);pr(-p*2,-p*2,p*4,p*4,c);
    pr(-p/2,-p/2,p,p,fl?'#fff':'#e0aaff');
    X.restore();
  }else if(e.type==='D'){
    pr(x-p,y-p*3,p*2,p*5,c);pr(x-p*2,y-p*2,p*4,p*2,c);
    pr(x-p*3,y-p,p,p,c);pr(x+p*2,y-p,p,p,c);
    pr(x-p/2,y+p*2,p,p*2,fl?'#f84':'#f40');
  }
  if(e.maxHp>2){
    X.fillStyle='#222';X.fillRect(e.x-e.w/2,e.y-e.h/2-5,e.w,3);
    X.fillStyle=e.hp/e.maxHp>.5?'#0f0':'#f80';
    X.fillRect(e.x-e.w/2,e.y-e.h/2-5,e.w*(e.hp/e.maxHp),3);
  }
}

// ── BOSS DRAW ─────────────────────────────────────────────────────
function drawBossSprite(bx,by,cfg_or_boss,scale){
  var p=PX()*1.3*(scale||1);
  var col=(cfg_or_boss.col||'#f80');
  var design=(cfg_or_boss.design||'dragon');
  var fl=Math.floor(Date.now()/80)%2;
  X.shadowBlur=10;X.shadowColor=col;
  if(design==='dragon'){
    // WARDEN — zırhlı kale gemisi tasarımı
    // Gövde: merkez blok + yanlara çıkan kanatlar
    pr(bx-p*3,by-p*4,p*6,p*8,col);           // ana gövde
    pr(bx-p*5,by-p*2,p*10,p*4,col);           // yatay kanat şeridi
    pr(bx-p*6,by-p,p*2,p*3,col);              // sol kanat ucu
    pr(bx+p*4,by-p,p*2,p*3,col);              // sağ kanat ucu
    // Zırh detayları
    pr(bx-p*2,by-p*4,p*4,p,ca(col,0.5));      // üst zırh plaka
    pr(bx-p*4,by-p*2,p,p*4,'#f40');           // sol ateş çıkışı
    pr(bx+p*3,by-p*2,p,p*4,'#f40');           // sağ ateş çıkışı
    // Merkez top namlusu
    pr(bx-p,by+p*3,p*2,p*3,fl?'#ff0':'#fa0');
    pr(bx-p*2,by+p*4,p*4,p*2,col);
    // Gözler / sensörler
    X.shadowColor='#ff0';X.shadowBlur=14;
    pr(bx-p*2,by-p*2,p*2,p*2,fl?'#fff':'#ff0');
    pr(bx,by-p*2,p*2,p*2,fl?'#fff':'#ff0');
    X.shadowBlur=0;
    pr(bx-p,by-p,p,p,'#000');pr(bx+p*0.5,by-p,p,p,'#000');
    // Kanat roket alevi
    pr(bx-p*6,by+p,p,p*2,fl?'#ff0':'#f80');
    pr(bx+p*5,by+p,p,p*2,fl?'#ff0':'#f80');
  }else if(design==='spider'){
    var legs=[[-6,-2],[-7,0],[-5,2],[6,-2],[7,0],[5,2]];
    for(var i=0;i<legs.length;i++){pr(bx+legs[i][0]*p,by+legs[i][1]*p,p*2,p,col);pr(bx+legs[i][0]*p+(legs[i][0]>0?p*2:-p*2),by+legs[i][1]*p+p,p*2,p,col);}
    pr(bx-p*3,by-p*3,p*6,p*6,col);pr(bx-p*4,by-p*2,p*8,p*4,col);pr(bx-p*2,by-p*2,p*4,p*4,'#1a001a');
    X.shadowColor='#ff0';X.shadowBlur=8;
    var ep=[[-2,-1],[0,-2],[2,-1],[-1,1],[1,1]];
    for(var i=0;i<ep.length;i++)pr(bx+ep[i][0]*p,by+ep[i][1]*p,p,p,(fl&&i%2===0)?'#fff':'#ffe000');
    X.shadowBlur=0;
  }else{
    var rot=(cfg_or_boss.rot||0);
    X.save();X.translate(bx,by);X.rotate(rot*2);
    for(var i=0;i<8;i++){var a=i*(Math.PI/4)+rot;pr(Math.cos(a)*p*7-p,Math.sin(a)*p*7-p,p*2,p*2,col);}
    X.restore();
    pr(bx-p*3,by-p*3,p*6,p*6,'#000');pr(bx-p*4,by-p*2,p*8,p*4,'#000');pr(bx-p*2,by-p*4,p*4,p*8,'#000');
    X.fillStyle=col;X.shadowColor=col;X.shadowBlur=14;
    pr(bx-p*2,by-p,p*4,p*2,col);X.shadowBlur=0;
    pr(bx-p,by-p/2,p*2,p,fl?'#fff':'#000');
  }
  X.shadowBlur=0;
}
function drawBoss(){
  if(!boss)return;
  boss.rot=(boss.rot||0)+.018;boss.tick=(boss.tick||0)+1;
  drawBossSprite(Math.floor(boss.x),Math.floor(boss.y),boss,1);
  var ph=boss.hp/boss.mhp;
  var bw=boss.w+28,bx=Math.floor(boss.x)-bw/2,by=Math.floor(boss.y)-boss.h/2-14;
  X.fillStyle='#111';X.fillRect(bx,by,bw,7);
  X.fillStyle=ph>.6?'#0f0':ph>.3?'#ff0':'#f33';X.fillRect(bx,by,bw*ph,7);
  X.strokeStyle='#333';X.lineWidth=1;X.strokeRect(bx,by,bw,7);
  X.textAlign='center';X.fillStyle=boss.col;X.font='bold '+Math.floor(W()/26)+'px Courier New';
  X.shadowBlur=8;X.shadowColor=boss.col;X.fillText(boss.name,boss.x,boss.y-boss.h/2-20);X.shadowBlur=0;
  if(boss.la){X.save();X.strokeStyle='rgba(255,40,40,'+(0.5+0.5*Math.sin(Date.now()/35))+')';X.lineWidth=PX()*3;X.shadowBlur=18;X.shadowColor='#f00';X.beginPath();X.moveTo(boss.lx,boss.y+boss.h/2);X.lineTo(boss.lx,H());X.stroke();X.restore();}
  if(boss.lc>0&&!boss.la){X.save();X.strokeStyle='rgba(255,100,100,'+(boss.lc/120)+')';X.lineWidth=PX();X.setLineDash([PX()*2,PX()*2]);X.beginPath();X.moveTo(boss.x,boss.y+boss.h/2);X.lineTo(boss.x,H());X.stroke();X.setLineDash([]);X.restore();}
}

// ── BOSS INTRO DRAW — the ONLY draw function for bossIntro phase ──
function drawBossIntroScreen(){
  var cw=W(),ch=H(),px=PX();
  var t=introT;           // counts 300 → 0
  var col=introCfg.col;
  var nm=introCfg.name;

  // fill black
  X.fillStyle='#000';
  X.fillRect(0,0,cw,ch);

  // draw stars (static during intro)
  drawStars();

  if(t>60){
    // ── PHASE A: name reveal ──
    var prog=(300-t)/240; // 0 → 1 as t goes 300 → 60
    if(prog<0)prog=0; if(prog>1)prog=1;

    // dark overlay
    X.fillStyle='rgba(0,0,10,'+(0.15+prog*0.82)+')';
    X.fillRect(0,0,cw,ch);

    // colored scanlines
    X.globalAlpha=0.07; X.fillStyle=col;
    for(var i=0;i<ch;i+=4) X.fillRect(0,i,cw,2);
    X.globalAlpha=1;

    // corner brackets
    var cb=px*5;
    X.fillStyle=col;
    X.fillRect(0,0,cb,px);    X.fillRect(0,0,px,cb);
    X.fillRect(cw-cb,0,cb,px);X.fillRect(cw-px,0,px,cb);
    X.fillRect(0,ch-px,cb,px);X.fillRect(0,ch-cb,px,cb);
    X.fillRect(cw-cb,ch-px,cb,px);X.fillRect(cw-px,ch-cb,px,cb);

    // "BOSS YAKLAŞIYOR" blink in first 40%
    if(prog<0.42 && Math.floor(t/8)%2===0){
      X.textAlign='center';
      X.fillStyle='#f00';X.shadowBlur=10;X.shadowColor='#f00';
      X.font='bold '+Math.floor(cw/19)+'px Courier New';
      X.fillText('!! BOSS YAKLAŞIYOR !!',cw/2,ch*0.18);
      X.shadowBlur=0;
    }

    // BOSS NAME: letters fall from top one by one
    var nameProg = prog<0.08 ? 0 : Math.min(1,(prog-0.08)/0.62);
    if(nameProg>0){
      var fs=Math.floor(cw/5.0);
      X.font='bold '+fs+'px Courier New';
      X.textBaseline='middle';X.textAlign='left';
      // measure letters
      var ws=[],totalW=0;
      for(var i=0;i<nm.length;i++){
        var ww=X.measureText(nm[i]).width;
        ws.push(ww);totalW+=ww;
      }
      var ox=cw/2-totalW/2;
      var targetY=ch*0.40;
      for(var i=0;i<nm.length;i++){
        // stagger each letter
        var lp=nameProg*nm.length - i;
        if(lp<=0){ox+=ws[i];continue;}
        if(lp>1)lp=1;
        // ease out cubic
        var ease=1-Math.pow(1-lp,3);
        var ly=(-fs*2.5)+(targetY+fs*2.5)*ease;
        // bounce at landing
        if(lp>0.82) ly+=Math.sin((lp-0.82)/0.18*Math.PI)*px*5*(1-lp)*0.5;
        // black shadow
        X.fillStyle='rgba(0,0,0,0.9)';
        X.fillText(nm[i],ox+px*2,ly+px*2);
        // colored glow
        X.fillStyle=col;
        X.shadowBlur=Math.round(lp*30);X.shadowColor=col;
        X.fillText(nm[i],ox,ly);
        X.shadowBlur=0;
        // white flash when freshly landed
        if(lp<0.20){
          X.fillStyle='rgba(255,255,255,'+(1-lp/0.20)+')';
          X.fillText(nm[i],ox,ly);
        }
        ox+=ws[i];
      }
      X.textBaseline='alphabetic';
      // underline after all letters landed
      if(nameProg>0.90){
        var ual=Math.min(1,(nameProg-0.90)*10);
        X.globalAlpha=ual;X.fillStyle=col;
        X.fillRect(cw*0.06,ch*0.46,cw*0.88,px*0.7);
        X.globalAlpha=1;
      }
    }

    // HP bar + pattern (prog > 0.60)
    if(prog>0.60){
      var ial=Math.min(1,(prog-0.60)*2.5);
      X.globalAlpha=ial;X.textAlign='center';
      var pd={spiral:'[ SPİRAL ATİŞİ ]',wave:'[ DALGA ATİŞİ ]',cross:'[ ÇAPRAZ YILDIZ ]'};
      X.fillStyle='#888';X.font=Math.floor(cw/34)+'px Courier New';
      X.fillText(pd[introCfg.pattern]||'',cw/2,ch*0.54);
      var hbw=Math.floor(cw*0.56),hbh=px*3,hbx=cw/2-hbw/2,hby=ch*0.60;
      X.strokeStyle=col;X.lineWidth=px*0.5;X.strokeRect(hbx,hby,hbw,hbh);
      X.fillStyle=ca(col,0.13);X.fillRect(hbx,hby,hbw,hbh);
      X.fillStyle=col;X.fillRect(hbx,hby,Math.min(1,(prog-0.60)*4)*hbw,hbh);
      X.fillStyle='#ccc';X.font=Math.floor(cw/42)+'px Courier New';
      X.fillText('HP: '+introCfg.hp,cw/2,hby+hbh*0.85);
      X.globalAlpha=1;
    }

    // HAZIR OL blink (prog > 0.80)
    if(prog>0.80){
      var hal=Math.min(1,(prog-0.80)*5);
      var bk=Math.floor(t/9)%2===0;
      X.globalAlpha=hal;
      X.fillStyle=bk?ca(col,0.27):'rgba(0,0,0,0.7)';
      X.fillRect(cw/2-80,ch*0.72,160,px*5);
      X.strokeStyle=bk?'#fff':col;X.lineWidth=bk?px*0.8:px*0.4;
      X.strokeRect(cw/2-80,ch*0.72,160,px*5);
      X.fillStyle=bk?'#fff':col;
      X.font='bold '+Math.floor(cw/23)+'px Courier New';X.textAlign='center';
      X.shadowBlur=bk?14:0;X.shadowColor='#fff';
      X.fillText('HAZIR OL!',cw/2,ch*0.72+px*5*0.70);
      X.shadowBlur=0;X.globalAlpha=1;
    }

  } else {
    // ── PHASE B: boss drops in (t 60→0) ──
    var ep=(60-t)/60; // 0→1

    // overlay fades out
    X.fillStyle='rgba(0,0,10,'+(0.90-ep*0.82)+')';
    X.fillRect(0,0,cw,ch);

    // boss y: from top (-120) to landing pos (ch*0.22)
    var entY=-120+(ch*0.22+120)*ep;
    var bx2=Math.floor(cw/2),by2=Math.floor(entY);

    // entry trail
    if(by2>-100){
      var grad=X.createLinearGradient(bx2,by2-80,bx2,by2);
      grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,ca(col,0.53));
      X.fillStyle=grad;X.fillRect(bx2-px*6,by2-80,px*12,80);
    }

    // shockwave ring
    if(ep>0.35){
      var rp=(ep-0.35)/0.65;
      X.globalAlpha=Math.max(0,0.6-rp*0.6);
      X.strokeStyle=col;X.lineWidth=px*2;
      X.beginPath();X.arc(bx2,by2,rp*cw*0.65,0,Math.PI*2);X.stroke();
      X.globalAlpha=1;
    }

    // boss sprite
    X.globalAlpha=Math.min(1,ep*3);
    X.shadowBlur=20;X.shadowColor=col;
    drawBossSprite(bx2,by2,introCfg,1);
    X.shadowBlur=0;X.globalAlpha=1;

    // fire particles off boss sides
    if(Math.random()<0.65){
      var sd=Math.random()<0.5?-1:1;
      parts.push({x:bx2+sd*(px*3+Math.random()*px*4),y:by2+Math.random()*px*5,
        vx:sd*(Math.random()*2+0.5),vy:-(Math.random()*1.5+0.3),
        life:16+Math.random()*10,col:col,r:PX()*(Math.random()*1.2+0.5)});
    }

    // name fades out
    X.globalAlpha=Math.max(0,1-ep*2.5);
    X.textAlign='center';X.textBaseline='middle';
    X.fillStyle=col;X.shadowBlur=18;X.shadowColor=col;
    X.font='bold '+Math.floor(cw/5.0)+'px Courier New';
    X.fillText(nm,cw/2,ch*0.38);
    X.shadowBlur=0;X.globalAlpha=1;X.textBaseline='alphabetic';
  }

  // particles
  for(var i=parts.length-1;i>=0;i--){
    var pt=parts[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.04;pt.life--;
    if(pt.life<=0){parts.splice(i,1);continue;}
    X.globalAlpha=pt.life/26;X.fillStyle=pt.col;
    X.fillRect(Math.floor(pt.x-pt.r/2),Math.floor(pt.y-pt.r/2),Math.ceil(pt.r),Math.ceil(pt.r));
  }
  X.globalAlpha=1;
  drawCRT();
}

// ── BOSS SHOOT / LASER ────────────────────────────────────────────
function bossShoot(){
  if(!boss||boss.entering||boss.st>0){if(boss&&boss.st>0)boss.st--;return;}
  var ph=boss.hp/boss.mhp,ang=Math.atan2(P.y-boss.y,P.x-boss.x);
  boss.sc=(boss.sc||0)+1;
  var bc=boss.col; // boss rengi mermilere geçiyor

  if(boss.pattern==='spiral'){
    boss.spiralAng=(boss.spiralAng||ang);
    boss.spiralAng+=ph>.66?.18:ph>.33?.25:.32;
    var spd=ph>.66?1.5:ph>.33?1.8:2.1;
    var arms=ph>.66?2:ph>.33?3:4;
    for(var i=0;i<arms;i++){
      var a=boss.spiralAng+i*(Math.PI*2/arms);
      if(Math.sin(a)>-0.1)
        eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:true,bt:'spiral',bc:bc,rot:a});
    }
    if(boss.sc%8===0){
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang)*2.0,vy:Math.sin(ang)*2.0,r:true,bt:'spiral_aimed',bc:bc,rot:ang});
    }
    boss.st=ph>.66?55:ph>.33?42:30;

  }else if(boss.pattern==='wave'){
    boss.waveT=(boss.waveT||0)+1;
    var wSpd=ph>.66?1.6:ph>.33?1.9:2.2;
    var sweep=Math.sin(boss.waveT*0.06)*0.5;
    for(var i=-1;i<=1;i++){
      var a=Math.PI/2+sweep+i*0.22;
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*wSpd,vy:Math.sin(a)*wSpd,r:true,bt:'wave',bc:bc});
    }
    if(boss.sc%5===0){
      var off=0.2;
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang-off)*wSpd,vy:Math.sin(ang-off)*wSpd,r:true,bt:'wave_aimed',bc:bc});
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang+off)*wSpd,vy:Math.sin(ang+off)*wSpd,r:true,bt:'wave_aimed',bc:bc});
    }
    boss.st=ph>.66?58:ph>.33?44:32;

  }else{
    var cSpd=ph>.66?1.5:ph>.33?1.8:2.0;
    var diags=[Math.PI/4,Math.PI*3/4,Math.PI*5/4,Math.PI*7/4];
    for(var i=0;i<diags.length;i++){
      var a=diags[i]+(boss.sc*.04);
      eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*cSpd,vy:Math.sin(a)*cSpd,r:true,bt:'cross',bc:bc,rot:a});
    }
    eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang)*cSpd,vy:Math.sin(ang)*cSpd,r:true,bt:'cross_aimed',bc:bc});
    if(ph<.33){
      boss.sa=(boss.sa||0)+.18;
      for(var i=0;i<3;i++){
        var a2=boss.sa+i*(Math.PI*2/3);
        if(Math.sin(a2)>-.15)
          eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a2)*1.6,vy:Math.sin(a2)*1.6,r:true,bt:'cross',bc:bc,rot:a2});
      }
    }
    boss.st=ph>.66?48:ph>.33?35:24;
  }

  if(ph<.66&&boss.ph===1){boss.ph=2;ft(boss.x,boss.y-28,'PHASE 2!',boss.col);ring(boss.x,boss.y,boss.col);sBossPhase();}
  if(ph<.33&&boss.ph===2){boss.ph=3;ft(boss.x,boss.y-28,'PHASE 3!','#f55');ring(boss.x,boss.y,'#f55');sBossPhase();}
}
function updateLaser(){
  if(!boss||!boss.la)return;boss.lt--;
  if(boss.lt<=0){boss.la=false;return;}
  if(P.inv<=0&&Math.abs(P.x-boss.lx)<13){
    if(P.shld>0){P.shld=0;boss.la=false;burst(P.x,P.y,'#0ff',8);}
    else{lives--;P.inv=120;sHit();if(lives<=0){state='dead';}}
  }
}

// ── ROCKET ────────────────────────────────────────────────────────
function doBomb(){rocketReady=1;ft(P.x,P.y-28,'ROKET HAZIR!','#f90');sPU();}
function fireRocket(){
  if(!rocketReady)return;rocketReady=0;
  rockets.push({x:P.x,y:P.y-P.h/2,vy:-8,exploded:false,timer:0});
  tn(200,.3,.3,'sawtooth');
}
function updateRockets(){
  for(var i=rockets.length-1;i>=0;i--){
    var rk=rockets[i];
    if(rk.exploded){rk.timer++;if(rk.timer>30)rockets.splice(i,1);continue;}
    rk.y+=rk.vy;
    var hit=false;
    for(var j=0;j<enemies.length;j++)if(Math.hypot(enemies[j].x-rk.x,enemies[j].y-rk.y)<50){hit=true;break;}
    if(boss&&Math.hypot(boss.x-rk.x,boss.y-rk.y)<70)hit=true;
    if(rk.y<30)hit=true;
    if(hit){
      rk.exploded=true;var rad=75;
      for(var j=enemies.length-1;j>=0;j--)if(Math.hypot(enemies[j].x-rk.x,enemies[j].y-rk.y)<rad){ring(enemies[j].x,enemies[j].y,enemies[j].col);score+=enemies[j].pts;enemies.splice(j,1);}
      if(boss&&Math.hypot(boss.x-rk.x,boss.y-rk.y)<rad+30){boss.hp-=Math.ceil(boss.mhp*.15);if(boss.hp<=0){var pts=600+wave*80;score+=pts;bossExplode(boss.x,boss.y,boss.col);sBossDead();ft(boss.x,boss.y,'BOSS +'+pts,'#ff0');boss=null;}else burst(boss.x,boss.y,'#f90',10);}
      for(var k=0;k<3;k++)ring(rk.x+(Math.random()-.5)*40,rk.y+(Math.random()-.5)*40,'#f90');
      sPop(true);ft(rk.x,rk.y,'BOOM!','#f90');
    }
  }
}

// ── WIN SCREEN ────────────────────────────────────────────────────
var WIN_LINES=[
  {txt:'★  TEBRİKLER!  ★',col:'#ff0',size:1/8},
  {txt:'GALAKSİYİ KURTARDIK!',col:'#0ff',size:1/14},
  {txt:'TÜM 15 DALGA',col:'#0f0',size:1/20},
  {txt:'BAŞARIYLA TAMAMLANDI',col:'#0f0',size:1/20},
  {txt:'FINAL SKOR',col:'#aaa',size:1/22},
  {txt:'__SCORE__',col:'#fff',size:1/12},
  {txt:'Sen galaksinin',col:'#f0f',size:1/28},
  {txt:'en büyük savunucususun!',col:'#f0f',size:1/28},
];
function drawWinScreen(){
  var cw=W(),ch=H();
  winTimer++;
  X.fillStyle='#000';X.fillRect(0,0,cw,ch);
  drawStars();
  X.fillStyle='rgba(0,0,10,.82)';X.fillRect(0,0,cw,ch);
  // confetti
  if(winTimer%3===0)winParts.push({x:Math.random()*cw,y:-10,vx:(Math.random()-.5)*2,vy:Math.random()*2+1,col:['#ff0','#0ff','#f0f','#0f0','#f55','#f90','#fff'][Math.floor(Math.random()*7)],life:180+Math.random()*60,r:PX()*(Math.random()*1.5+.5),rot:Math.random()*Math.PI*2,rotv:(Math.random()-.5)*.12});
  for(var i=winParts.length-1;i>=0;i--){var wp=winParts[i];wp.x+=wp.vx;wp.y+=wp.vy;wp.vy+=.03;wp.rot+=wp.rotv;wp.life--;if(wp.life<=0||wp.y>ch+20){winParts.splice(i,1);continue;}X.globalAlpha=Math.min(1,wp.life/40);X.fillStyle=wp.col;X.save();X.translate(wp.x,wp.y);X.rotate(wp.rot);X.fillRect(-wp.r,-wp.r,wp.r*2,wp.r*2);X.restore();}X.globalAlpha=1;
  // lines sliding in
  var yBase=ch*.14,lineH=ch*0.095,speed=1.4,delay=40;
  X.textAlign='center';
  for(var i=0;i<WIN_LINES.length;i++){
    var ln=WIN_LINES[i];
    var startF=delay+i*18,targetY=yBase+i*lineH,t2=winTimer-startF;
    if(t2<0)continue;
    var curY;
    if(t2*speed<(targetY+50)){curY=-50+t2*speed;}
    else{var settled=t2*speed-(targetY+50);var bounce=Math.max(0,6*Math.exp(-settled*.18)*Math.cos(settled*.28));curY=targetY-bounce;}
    var txt=ln.txt==='__SCORE__'?(''+score):ln.txt;
    X.font='bold '+Math.floor(cw*ln.size)+'px Courier New';
    X.shadowBlur=12;X.shadowColor=ln.col;X.fillStyle=ln.col;
    X.fillText(txt,cw/2,curY);X.shadowBlur=0;
  }
  // frame
  if(winTimer>80){var px2=PX(),fal=Math.min(.9,(winTimer-80)/60);X.globalAlpha=fal;X.strokeStyle='#ff0';X.lineWidth=px2*1.5;X.strokeRect(px2*2,px2*2,cw-px2*4,ch-px2*4);X.strokeStyle='#0ff';X.lineWidth=px2*.5;X.strokeRect(px2*4,px2*4,cw-px2*8,ch-px2*8);X.globalAlpha=1;}
  // menu button
  if(winTimer>160){
    var blink=Math.floor(winTimer/22)%2===0,bx=cw/2-90,by=ch*.88,bw=180,bh=PX()*7;
    X.globalAlpha=Math.min(1,(winTimer-160)/40);
    X.fillStyle=blink?'rgba(0,255,255,.18)':'rgba(0,0,0,.5)';X.fillRect(bx,by,bw,bh);
    X.strokeStyle=blink?'#0ff':'#444';X.lineWidth=blink?PX()*.8:PX()*.4;X.strokeRect(bx,by,bw,bh);
    X.fillStyle=blink?'#0ff':'#556';X.font='bold '+Math.floor(cw/22)+'px Courier New';
    X.shadowBlur=blink?10:0;X.shadowColor='#0ff';X.fillText('🏠 ANA MENÜ',cw/2,by+bh*.7);X.shadowBlur=0;X.globalAlpha=1;
  }
  drawCRT();
}

// ── RESET ─────────────────────────────────────────────────────────
function resetAll(){
  score=0;lives=3;wave=1;combo=0;cTimer=0;warpT=0;
  phase='idle';phTimer=0;cdN=0;
  introActive=false;introT=0;introCfg=null;
  winTimer=0;winParts=[];
  bullets=[];eBullets=[];enemies=[];parts=[];pups=[];floats=[];rockets=[];
  boss=null;bDir=1;sCool=0;rTimer=0;xTimer=0;rocketReady=0;
  paused=false;PB.textContent='⏸';
  resetP();
}

// ── UPDATE ────────────────────────────────────────────────────────
function update(){
  if(state!=='play'||paused)return;

  // stars/planets always scroll
  for(var i=0;i<stars.length;i++){var s=stars[i];s.y+=s.sp;if(s.y>H())s.y=0;s.tw=(s.tw+1)%60;}
  for(var i=0;i<planets.length;i++){var pl=planets[i];pl.y+=pl.sp;if(pl.y>H()+pl.r*2){pl.y=-pl.r*2;pl.x=Math.random()*W();}}

  // ── phase machine ──────────────────────────────────────────────
  if(phase==='idle'){
    phase='countdown';cdN=3;phTimer=60;
    return;
  }
  if(phase==='countdown'){
    phTimer--;
    if(phTimer<=0){cdN--;phTimer=60;}
    if(cdN<0){spawnWave(wave);}
    return;
  }
  if(phase==='bossIntro'){
    // ONLY decrement introT, then return — draw() handles the visuals
    introT--;
    if(introT<=0){spawnBoss();}
    return;
  }
  if(phase==='clearing'){
    phTimer--;
    if(phTimer===25)warpT=13;
    if(phTimer<=0){
      wave++;
      if(wave>MAX_WAVE){state='win';winTimer=0;winParts=[];sWin();return;}
      lives=Math.min(5,lives+1);bullets=[];eBullets=[];resetP();phase='idle';
    }
    return;
  }
  if(phase==='bossExploding'){
    // parçacıklar ve floatlar güncelle, bitince clearing'e geç
    for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--;if(p.life<=0)parts.splice(i,1);}
    for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}
    if(parts.length===0&&floats.length===0){phase='clearing';phTimer=60;}
    return;
  }
  if(warpT>0){warpT--;for(var i=0;i<stars.length;i++)stars[i].sp=20;return;}

  // ── gameplay ───────────────────────────────────────────────────
  var sp=P.spd*(W()/300);
  if(K.l)P.x=Math.max(P.w/2,P.x-sp);
  if(K.r)P.x=Math.min(W()-P.w/2,P.x+sp);
  if(K.u)P.y=Math.max(P.h/2,P.y-sp);
  if(K.d)P.y=Math.min(H()-P.h/2,P.y+sp);

  if(K.f&&sCool<=0){
    if(rocketReady){fireRocket();sCool=10;}
    else if(xTimer>0){for(var i=-2;i<=2;i++)bullets.push({x:P.x,y:P.y-P.h/2,vx:i*1.6,vy:-12});}
    else bullets.push({x:P.x,y:P.y-P.h/2,vx:0,vy:-12});
    if(!rocketReady)sCool=rTimer>0?7:14;
    sShoot();
  }
  if(sCool>0)sCool--;if(rTimer>0)rTimer--;if(xTimer>0)xTimer--;
  if(P.inv>0)P.inv--;if(P.shld>0)P.shld--;if(cTimer>0)cTimer--;else combo=0;

  var maxEB=Math.max(30,8+Math.floor(wave/2)*4);
  if(eBullets.length>maxEB)eBullets.splice(0,eBullets.length-maxEB);

  bullets=bullets.filter(function(b){return b.y>-15;});
  eBullets=eBullets.filter(function(b){return b.y<H()+15&&b.x>-25&&b.x<W()+25;});
  for(var i=0;i<bullets.length;i++){bullets[i].x+=bullets[i].vx;bullets[i].y+=bullets[i].vy;}
  for(var i=0;i<eBullets.length;i++){eBullets[i].x+=eBullets[i].vx;eBullets[i].y+=eBullets[i].vy;}

  var spd2=.20+wave*.010;
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];e.ang=(e.ang||0)+.05;
    if(e.entering){var ddx=e.tx-e.x,ddy=e.ty-e.y,dst=Math.sqrt(ddx*ddx+ddy*ddy);if(dst<2.5){e.entering=false;e.x=e.tx;e.y=e.ty;}else{e.x+=ddx/dst*2.8;e.y+=ddy/dst*2.8;}}
    else{
      if(e.mv==='side'){e.x+=e.dx*spd2;if(e.x>W()-e.w/2||e.x<e.w/2){e.dx*=-1;e.y+=6;}}
      else if(e.mv==='zigzag'){e.x+=e.dx*spd2;e.zt++;if(e.zt>35){e.zd*=-1;e.zt=0;}e.y+=e.zd*.4+.15;if(e.x>W()-e.w/2||e.x<e.w/2)e.dx*=-1;}
      else if(e.mv==='dive'){e.divePhase=(e.divePhase||0)+1;
        if(e.divePhase<60){e.x+=e.dx*spd2;if(e.x>W()-e.w/2||e.x<e.w/2)e.dx*=-1;}
        else if(e.divePhase<90){var ddx2=P.x-e.x,ddy2=P.y-e.y,dd=Math.sqrt(ddx2*ddx2+ddy2*ddy2)||1;e.x+=ddx2/dd*1.8;e.y+=ddy2/dd*1.8;}
        else if(e.divePhase<140){var ddx3=e.tx-e.x,ddy3=e.ty-e.y,dd2=Math.sqrt(ddx3*ddx3+ddy3*ddy3)||1;e.x+=ddx3/dd2*2;e.y+=ddy3/dd2*2;}
        else e.divePhase=0;}
      e.st--;
      if(e.st<=0){eBullets.push({x:e.x,y:e.y+e.h/2,vx:(Math.random()-.5)*.6,vy:e.bspd});e.st=Math.max(50,e.brate)+Math.random()*20;}
      if(e.y>H()-40){state='dead';return;}
    }
  }

  if(boss&&boss.entering){boss.y+=1.5;if(boss.y>=82)boss.entering=false;return;}
  if(boss){
    boss.x+=bDir*(.9+Math.floor(wave/5)*.1);
    if(boss.x>W()-boss.w/2||boss.x<boss.w/2)bDir*=-1;
    bossShoot();updateLaser();
    for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];
      if(Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){boss.hp--;bullets.splice(i,1);burst(b.x,b.y,boss.col,4);
        if(boss.hp<=0){var pts=600+wave*80;score+=pts;bossExplode(boss.x,boss.y,boss.col);sBossDead();ft(boss.x,boss.y,'BOSS +'+pts,'#ff0');boss=null;}}}
  }

  outer:for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];
    for(var j=enemies.length-1;j>=0;j--){var e=enemies[j];
      if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){e.hp--;bullets.splice(i,1);burst(b.x,b.y,e.col,3,2.5);
        if(e.hp<=0){combo++;cTimer=72;score+=e.pts*Math.max(1,combo);if(combo>=3)ft(e.x,e.y,'x'+combo+' COMBO!','#ff0');
          ring(e.x,e.y,e.col);sPop(false);
          if(Math.random()<(wave<=5?.28:.18)&&lives<5)pups.push({x:e.x,y:e.y,t:'H',vy:1.1});
          else if(Math.random()<.28){var ts=['R','S','X','B','R','S'];pups.push({x:e.x,y:e.y,t:ts[Math.floor(Math.random()*ts.length)],vy:1.1});}
          enemies.splice(j,1);}continue outer;}}}

  if(P.inv<=0){for(var i=eBullets.length-1;i>=0;i--){var b=eBullets[i];
    var hit=b.r?Math.hypot(b.x-P.x,b.y-P.y)<P.w/2+3:Math.abs(b.x-P.x)<P.w/2&&Math.abs(b.y-P.y)<P.h/2;
    if(hit){eBullets.splice(i,1);if(P.shld>0){P.shld=0;burst(P.x,P.y,'#0ff',8);}
      else{lives--;P.inv=120;sHit();burst(P.x,P.y,'#4af',10);if(lives<=0){state='dead';}}break;}}}

  for(var i=pups.length-1;i>=0;i--){var p=pups[i];p.y+=p.vy;if(p.y>H()){pups.splice(i,1);continue;}
    if(Math.abs(p.x-P.x)<22&&Math.abs(p.y-P.y)<22){
      if(p.t==='R')rTimer=280;else if(p.t==='S')P.shld=400;else if(p.t==='X')xTimer=280;
      else if(p.t==='H'){lives=Math.min(5,lives+1);ft(P.x,P.y-24,'+1 CAN!','#f55');}
      else if(p.t==='B')doBomb();
      ring(p.x,p.y,'#ff0',5,2.5);sPU();pups.splice(i,1);
    }}

  updateRockets();
  for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--;if(p.life<=0)parts.splice(i,1);}
  for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}
  if(enemies.length===0&&!boss&&(phase==='playing'||phase==='bossPlaying')){phase='clearing';phTimer=60;}

  document.getElementById('sEl').textContent=score;
  document.getElementById('wEl').textContent=wave+'/'+MAX_WAVE;
  document.getElementById('lEl').textContent='❤️'.repeat(Math.max(0,lives));
}

// ── DRAW ──────────────────────────────────────────────────────────
function draw(){
  var cw=W(),ch=H();
  X.fillStyle='#000';X.fillRect(0,0,cw,ch);

  // ── START SCREEN ───────────────────────────────────────────────
  if(state==='start'){
    drawStars();
    X.textAlign='center';
    var ts=Math.floor(cw/11),bs=Math.floor(cw/32),lh=bs*2.1;
    X.font='bold '+ts+'px Courier New';X.fillStyle='#0ff';X.shadowBlur=18;X.shadowColor='#0ff';
    X.fillText('GALACTIC',cw/2,ch*.12);X.fillText('DEFENDER',cw/2,ch*.22);X.shadowBlur=0;
    X.font=bs+'px Courier New';var y=ch*.34;
    X.fillStyle='#aff';X.fillText('🕹️  Hareket',cw/2,y);y+=lh;X.fillText('🔥  Ateş Et',cw/2,y);y+=lh*1.3;
    X.fillStyle='#ff0';X.fillText('💛Can  ⚡Hız  🛡Kalkan  ✦Spread  🚀Roket',cw/2,y);y+=lh*1.3;
    X.fillStyle='#f0f';X.fillText('Her 5 dalgada BOSS! 👾',cw/2,y);y+=lh;
    X.fillStyle='#0f0';X.fillText(MAX_WAVE+' dalga — galaksiyi kurtar 🏁',cw/2,y);y+=lh*1.7;
    X.font='bold '+Math.floor(cw/22)+'px Courier New';X.fillStyle='#ff0';X.shadowBlur=10;X.shadowColor='#ff0';X.fillText('🔥 bas başlat',cw/2,y);X.shadowBlur=0;y+=lh*1.2;
    var bx=cw/2-65,by=y,bw=130,bh=28;
    X.fillStyle=musicOn?'rgba(0,255,255,.12)':'rgba(70,70,70,.25)';X.strokeStyle=musicOn?'#0ff':'#444';X.lineWidth=1.5;
    X.beginPath();X.roundRect(bx,by,bw,bh,10);X.fill();X.stroke();
    X.font=Math.floor(cw/38)+'px Courier New';X.fillStyle=musicOn?'#0ff':'#555';
    X.fillText((musicOn?'🎵':'🔇')+'  Müzik '+(musicOn?'Açık':'Kapalı'),cw/2,by+bh*.68);
    drawCRT();
    return;
  }

  // ── DEAD SCREEN ────────────────────────────────────────────────
  if(state==='dead'){
    drawStars();
    X.textAlign='center';
    X.fillStyle='#f44';X.font='bold '+Math.floor(cw/9)+'px Courier New';X.shadowBlur=14;X.shadowColor='#f44';X.fillText('GAME OVER',cw/2,ch*.32);X.shadowBlur=0;
    X.fillStyle='#fff';X.font='bold '+Math.floor(cw/22)+'px Courier New';X.fillText('SKOR: '+score,cw/2,ch*.46);
    X.fillStyle='#0ff';X.font=Math.floor(cw/26)+'px Courier New';X.shadowBlur=8;X.shadowColor='#0ff';X.fillText('🔥 bas tekrar',cw/2,ch*.88);X.shadowBlur=0;
    drawCRT();
    return;
  }

  // ── WIN SCREEN ─────────────────────────────────────────────────
  if(state==='win'){
    drawWinScreen();
    return;
  }

  // ── BOSS INTRO — full screen takeover ─────────────────────────
  if(phase==='bossIntro'){
    drawBossIntroScreen();
    return;  // ← nothing else draws
  }

  // ── GAMEPLAY ───────────────────────────────────────────────────

  // warp effect
  if(warpT>0){
    for(var i=0;i<stars.length;i++){var s=stars[i];X.strokeStyle='rgba(255,255,255,.4)';X.lineWidth=1;X.beginPath();X.moveTo(s.x,s.y);X.lineTo(s.x,s.y+s.sp*13);X.stroke();}
    drawCRT();return;
  }

  drawStars();

  // paused overlay
  if(paused){
    X.fillStyle='rgba(0,0,0,.65)';X.fillRect(0,0,cw,ch);
    X.textAlign='center';X.fillStyle='#ff0';X.font='bold '+Math.floor(cw/10)+'px Courier New';
    X.shadowBlur=12;X.shadowColor='#ff0';X.fillText('DURAKLADI',cw/2,ch/2);X.shadowBlur=0;
    X.fillStyle='#aff';X.font=Math.floor(cw/28)+'px Courier New';X.fillText('⏸ butonuna bas',cw/2,ch/2+42);
    drawCRT();return;
  }

  // enemies
  for(var i=0;i<enemies.length;i++)drawEnemySprite(enemies[i]);
  drawBoss();
  for(var i=0;i<pups.length;i++)drawPup(pups[i]);

  // rockets
  var rpx=PX();
  for(var i=0;i<rockets.length;i++){
    var rk=rockets[i];
    if(!rk.exploded){
      X.fillStyle='#f90';X.shadowBlur=12;X.shadowColor='#f90';
      X.fillRect(Math.floor(rk.x-rpx*1.5),Math.floor(rk.y-rpx*4),rpx*3,rpx*6);
      X.fillStyle='#ff0';X.fillRect(Math.floor(rk.x-rpx),Math.floor(rk.y-rpx*6),rpx*2,rpx*2);
      X.fillStyle='#f55';X.fillRect(Math.floor(rk.x-rpx*3),Math.floor(rk.y),rpx*2,rpx*3);X.fillRect(Math.floor(rk.x+rpx),Math.floor(rk.y),rpx*2,rpx*3);
      var rfl=Math.floor(Date.now()/60)%2;X.fillStyle=rfl?'#ff0':'#f84';X.fillRect(Math.floor(rk.x-rpx),Math.floor(rk.y+rpx*2),rpx*2,rpx*2);
      X.shadowBlur=0;
      X.strokeStyle='rgba(255,150,0,.3)';X.lineWidth=2;X.beginPath();X.arc(rk.x,rk.y,75,0,Math.PI*2);X.stroke();
    }else{
      var ep=rk.timer/30;
      X.strokeStyle='rgba(255,150,0,'+(1-ep)+')';X.lineWidth=3;X.beginPath();X.arc(rk.x,rk.y,75*ep,0,Math.PI*2);X.stroke();
      X.fillStyle='rgba(255,200,0,'+(0.35*(1-ep))+')';X.beginPath();X.arc(rk.x,rk.y,35*ep,0,Math.PI*2);X.fill();
    }
  }
  X.shadowBlur=0;

  // player bullets
  var px=PX();
  var bCols=['#0f0','#ff0','#0ff','#f0f'];
  for(var i=0;i<bullets.length;i++){
    var bc=bCols[i%4];
    X.fillStyle=bc;X.shadowBlur=5;X.shadowColor=bc;
    var bx=Math.floor(bullets[i].x),by=Math.floor(bullets[i].y);
    X.beginPath();X.moveTo(bx,by-px*3);X.lineTo(bx+px,by-px);X.lineTo(bx,by+px);X.lineTo(bx-px,by-px);X.closePath();X.fill();
    X.fillStyle='#fff';X.fillRect(bx-px/2,by-px*2,px,px);
  }
  X.shadowBlur=0;

  // enemy bullets
  for(var i=0;i<eBullets.length;i++){
    var b=eBullets[i];
    var bx2=Math.floor(b.x),by2=Math.floor(b.y);
    if(b.bt){
      // ── BOSS BULLETS: her pattern'in kendi görünümü ──
      var bc2=b.bc||'#f55';
      X.save();
      X.translate(bx2,by2);
      if(b.bt==='spiral'||b.bt==='spiral_aimed'){
        // WARDEN: turuncu dönen üçgen
        var angle2=Math.atan2(b.vy,b.vx);
        X.rotate(angle2+Math.PI/2);
        X.fillStyle=b.bt==='spiral_aimed'?'#fff':bc2;
        X.shadowBlur=8;X.shadowColor=bc2;
        X.beginPath();
        X.moveTo(0,-px*2.5);
        X.lineTo(px*1.5,px*1.5);
        X.lineTo(-px*1.5,px*1.5);
        X.closePath();X.fill();
        // iç parlama
        X.fillStyle='rgba(255,255,255,0.5)';
        X.beginPath();X.arc(0,0,px*0.6,0,Math.PI*2);X.fill();
        X.shadowBlur=0;
      }else if(b.bt==='wave'||b.bt==='wave_aimed'){
        // CRUSHER: mor damla şekli
        X.fillStyle=b.bt==='wave_aimed'?'#fff':bc2;
        X.shadowBlur=9;X.shadowColor=bc2;
        X.beginPath();
        X.arc(0,0,px*1.4,0,Math.PI*2);X.fill();
        // dış halka
        X.strokeStyle=bc2;X.lineWidth=px*0.5;
        X.globalAlpha=0.5;
        X.beginPath();X.arc(0,0,px*2.2,0,Math.PI*2);X.stroke();
        X.globalAlpha=1;
        // merkez nokta
        X.fillStyle='#fff';
        X.beginPath();X.arc(0,0,px*0.5,0,Math.PI*2);X.fill();
        X.shadowBlur=0;
      }else if(b.bt==='cross'||b.bt==='cross_aimed'){
        // NEMESIS: sarı dönen artı/yıldız
        var ang3=Math.atan2(b.vy,b.vx);
        X.rotate(ang3+(Date.now()*0.008%Math.PI)); // sürekli döner
        X.fillStyle=b.bt==='cross_aimed'?'#fff':bc2;
        X.shadowBlur=10;X.shadowColor=bc2;
        // artı şekli
        X.fillRect(-px*0.7,-px*2.5,px*1.4,px*5);
        X.fillRect(-px*2.5,-px*0.7,px*5,px*1.4);
        // köşe noktaları
        X.fillStyle='rgba(255,255,255,0.7)';
        for(var k=0;k<4;k++){
          var ka=k*(Math.PI/2);
          X.beginPath();X.arc(Math.cos(ka)*px*1.8,Math.sin(ka)*px*1.8,px*0.5,0,Math.PI*2);X.fill();
        }
        X.shadowBlur=0;
      }
      X.restore();
    }else if(b.r){
      // düşman (normal) mermisi — kırmızı kare
      X.fillStyle='#f55';X.shadowBlur=3;X.shadowColor='#f55';
      X.fillRect(bx2-px,by2-px,px*2,px*2);
      X.shadowBlur=0;
    }else{
      // düşman uzun mermisi
      X.fillStyle='#f55';X.shadowBlur=3;X.shadowColor='#f55';
      X.fillRect(bx2-px/2,by2-px,px,px*3);
      X.shadowBlur=0;
    }
  }

  // particles
  for(var i=0;i<parts.length;i++){var p=parts[i];X.globalAlpha=Math.min(1,p.life/46);X.fillStyle=p.col;X.fillRect(Math.floor(p.x-p.r/2),Math.floor(p.y-p.r/2),Math.ceil(p.r),Math.ceil(p.r));}
  X.globalAlpha=1;

  // player ship (patlama sırasında gizle)
  if(phase!=='bossExploding'&&(P.inv<=0||Math.floor(P.inv/6)%2===0))drawShip();

  // countdown overlay
  if(phase==='countdown'){
    X.fillStyle='rgba(0,0,0,.5)';X.fillRect(0,0,cw,ch);X.textAlign='center';
    X.fillStyle='#ff0';X.font='bold '+Math.floor(cw/4)+'px Courier New';X.shadowBlur=24;X.shadowColor='#ff0';X.fillText(cdN>0?cdN:'GO!',cw/2,ch/2+20);X.shadowBlur=0;
    X.fillStyle='#aff';X.font=Math.floor(cw/26)+'px Courier New';
    var isBoss=(WAVE_DEFS[Math.min(wave-1,WAVE_DEFS.length-1)]||{}).boss;
    X.fillText('DALGA '+wave+'/'+MAX_WAVE+(isBoss?' — BOSS!':''),cw/2,ch/2-50);
    if(isBoss&&cdN>0){var bc=getBoss(wave);X.fillStyle=bc.col;X.font='bold '+Math.floor(cw/20)+'px Courier New';X.shadowBlur=10;X.shadowColor=bc.col;X.fillText('⚠ '+bc.name+' ⚠',cw/2,ch/2+78);X.shadowBlur=0;}
    else if(cdN>0){X.fillStyle='#0f0';X.font=Math.floor(cw/32)+'px Courier New';X.fillText('❤️ +1 Can!',cw/2,ch/2+78);}
  }

  // floats
  for(var i=0;i<floats.length;i++){var f=floats[i];X.globalAlpha=f.life/60;X.fillStyle=f.col;X.font='bold '+Math.floor(W()/26)+'px Courier New';X.textAlign='center';X.fillText(f.txt,f.x,f.y);}X.globalAlpha=1;

  // wave clear
  if(phase==='clearing'&&phTimer>10&&warpT<=0){X.fillStyle='#ff0';X.font='bold '+Math.floor(W()/18)+'px Courier New';X.textAlign='center';X.shadowBlur=10;X.shadowColor='#ff0';X.fillText('DALGA '+wave+' BİTTİ!',W()/2,H()/2);X.shadowBlur=0;}

  // boss exploding overlay text
  if(phase==='bossExploding'){
    var blink=Math.floor(Date.now()/120)%2===0;
    if(blink){X.fillStyle='#ff0';X.font='bold '+Math.floor(W()/14)+'px Courier New';X.textAlign='center';X.shadowBlur=16;X.shadowColor='#ff0';X.fillText('BOSS YIKILDI!',W()/2,H()/2);X.shadowBlur=0;}
  }

  // combo
  if(combo>=2&&cTimer>0){X.globalAlpha=Math.min(1,cTimer/25);X.fillStyle='#ff0';X.font='bold '+Math.floor(W()/22)+'px Courier New';X.textAlign='right';X.fillText('COMBO x'+combo,W()-8,20);X.globalAlpha=1;}

  // HUD icons
  X.textAlign='left';X.font=Math.floor(W()/36)+'px Courier New';var hx=8;
  if(rTimer>0){X.fillStyle='#ff0';X.fillText('⚡',hx,H()-8);hx+=20;}
  if(xTimer>0){X.fillStyle='#0f0';X.fillText('✦',hx,H()-8);hx+=20;}
  if(P.shld>0){X.fillStyle='#0ff';X.fillText('🛡',hx,H()-8);hx+=20;}
  if(rocketReady){X.fillStyle='#f90';X.shadowBlur=6;X.shadowColor='#f90';X.fillText('🚀',hx,H()-8);X.shadowBlur=0;}

  drawCRT();
}

// ── LOOP ──────────────────────────────────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}

function go(){
  if(state==='start'){state='play';phase='idle';startMusic();}
  else if(state==='dead'){resetAll();state='play';}
}
loop();
</script>
