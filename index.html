<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>:root{color-scheme:dark;}html,body{background-color:#000!important;}</style>
<title>Galactic Defender</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#000;height:100%;}
body{background:#000;display:flex;flex-direction:column;align-items:center;width:100vw;height:100vh;height:100dvh;font-family:'Courier New',monospace;overflow:hidden;touch-action:none;}
#ui{color:#0ff;font-size:12px;display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;padding:3px 10px;flex-shrink:0;padding-top:max(3px,env(safe-area-inset-top));}
#pauseBtn{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);border-radius:4px;color:#0ff;font-size:11px;padding:2px 6px;cursor:pointer;user-select:none;}
canvas{display:block;touch-action:none;image-rendering:pixelated;flex:1;width:100%;max-width:480px;}
#controls{position:fixed;bottom:max(60px,env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;max-width:480px;margin:0 auto;}
#jWrap{position:relative;width:96px;height:96px;}
#jBase{width:96px;height:96px;border-radius:50%;background:rgba(0,255,255,.07);border:2px solid rgba(0,255,255,.2);position:absolute;}
#jKnob{width:38px;height:38px;border-radius:50%;background:rgba(0,255,255,.28);border:2px solid #0ff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#rightSide{display:flex;flex-direction:row;align-items:center;gap:6px;}
#abilities{display:flex;flex-direction:column;gap:5px;align-items:center;}
.aBtn{border-radius:50%;font-size:16px;cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;transition:opacity 0.2s;width:46px;height:46px;}
.aBtn span{font-size:6px;margin-top:1px;font-family:'Courier New',monospace;letter-spacing:-0.5px;}
#shieldBtn{background:rgba(0,255,255,.15);border-color:#0ff;color:#0ff;}
#shieldBtn:active{background:rgba(0,255,255,.45);}
#rocketBtn{background:rgba(255,150,0,.15);border-color:#f90;color:#f90;}
#rocketBtn:active{background:rgba(255,150,0,.45);}
.aBtn.cooling{opacity:0.4;}
#activePups{display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.pupIcon{font-size:18px;line-height:1;text-shadow:0 0 8px currentColor;}
#fireBtn{width:68px;height:68px;border-radius:50%;background:rgba(255,50,50,.2);border:2px solid #f55;color:#f55;font-size:22px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;}
#fireBtn:active{background:rgba(255,50,50,.45);}
</style>
</head>
<body>
<div id="ui">
  <span>⭐<b id="sEl">0</b></span>
  <span>🌊<b id="wEl">1/15</b></span>
  <span id="lEl">❤️❤️❤️</span>
  <button id="pauseBtn">⏸</button>
</div>
<canvas id="c"></canvas>
<div id="controls">
  <div id="jWrap"><div id="jBase"></div><div id="jKnob"></div></div>
  <div id="activePups"></div>
  <div id="rightSide">
    <div id="abilities">
      <button class="aBtn" id="shieldBtn">🛡<span id="shieldCdTxt">HAZIR</span></button>
      <button class="aBtn" id="rocketBtn">🚀<span id="rocketCdTxt">HAZIR</span></button>
    </div>
    <button id="fireBtn">🔥</button>
  </div>
</div>
<script>
// ── CANVAS ──────────────────────────────────────────────────────
function ca(hex,a){
  if(hex.length===4){var r=parseInt(hex[1]+hex[1],16),g=parseInt(hex[2]+hex[2],16),b=parseInt(hex[3]+hex[3],16);return 'rgba('+r+','+g+','+b+','+a+')';}
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';
}
var C=document.getElementById('c'),X=C.getContext('2d');
X.imageSmoothingEnabled=false;
function resize(){
  var mw=Math.min(window.innerWidth,480);
  var uH=document.getElementById('ui').offsetHeight||28;
  var cH=108;
  var av=Math.max(180,window.innerHeight-uH-cH);
  C.width=Math.floor(mw);C.height=Math.floor(av);
  C.style.width=C.width+'px';C.style.height=C.height+'px';
  // Canvas resize context'i sıfırlar — her seferinde tekrar set et
  X.imageSmoothingEnabled=false;
}
resize();
window.addEventListener('resize',function(){resize();initStars();});
function W(){return C.width;}
function H(){return C.height;}
function PX(){return Math.max(2,Math.floor(W()/80));}
function pr(x,y,w,h,col){X.fillStyle=col;X.fillRect(Math.floor(x),Math.floor(y),Math.ceil(w),Math.ceil(h));}

// ── AUDIO ──────────────────────────────────────────────────────
var _ac=null,bgGain=null,bgOn=false,musicOn=true;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function toggleMusic(){musicOn=!musicOn;if(bgGain)bgGain.gain.value=musicOn?0.6:0;}
document.addEventListener('visibilitychange',function(){
  if(!_ac)return;
  if(document.hidden){try{_ac.suspend();}catch(e){}}
  else{try{_ac.resume();}catch(e){}}
});
function tn(f,v,d,tp,delay){try{var a=AC(),t=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();o.type=tp||'square';o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d);}catch(e){}}
function sShoot(){tn(700,.06,.05,'square');}
function sHit(){tn(110,.2,.2,'sawtooth');}
function sPop(big){try{var a=AC(),len=a.sampleRate*(big?.5:.18),buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);var s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=big?250:700;s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(big?.6:.28,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+(big?.5:.18));s.start();s.stop(a.currentTime+(big?.5:.18));}catch(e){}}
function sPU(){[523,659,784,1047].forEach(function(f,i){tn(f,.12,.09,'sine',i*.06);});}
function sBossIn(){tn(80,.5,.7,'sawtooth');tn(60,.5,.7,'sawtooth',.35);tn(40,.7,1,'sawtooth',.7);}
function sBossPhase(){tn(55,.4,.5,'sawtooth');tn(80,.3,.4,'sawtooth',.2);}
function sBossDead(){for(var i=0;i<4;i++)(function(ii){setTimeout(function(){sPop(true);tn(30+ii*10,.5,.6,'sawtooth');},ii*150);})(i);}
function bossExplode(x,y,col){
  eBullets=[];bullets=[];pups=[];
  phase='bossExploding';
  for(var i=0;i<40;i++){
    var a=Math.random()*Math.PI*2,spd=Math.random()*6+1;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:50+Math.random()*30,
      col:[col,'#fff','#ff0','#f80','#f55'][Math.floor(Math.random()*5)],
      r:PX()*(Math.random()*3+1)});
  }
  for(var w=0;w<3;w++)(function(wi){
    setTimeout(function(){
      for(var i=0;i<16;i++){
        var a=i*(Math.PI/8);
        parts.push({x:x,y:y,vx:Math.cos(a)*(4+wi*1.5),vy:Math.sin(a)*(4+wi*1.5),
          life:22,col:wi===0?'#fff':wi===1?col:'#ff0',r:PX()*1.5});
      }
    },wi*120);
  })(w);
  for(var i=0;i<14;i++){
    var a=Math.random()*Math.PI*2,spd2=Math.random()*10+3;
    parts.push({x:x,y:y,vx:Math.cos(a)*spd2,vy:Math.sin(a)*spd2,
      life:30+Math.random()*15,col:'#fff',r:PX()*(Math.random()*2+1.5)});
  }
}
function sWin(){tn(523,.3,.2,'sine');tn(659,.3,.2,'sine',.15);tn(784,.3,.2,'sine',.3);tn(1047,.4,.6,'sine',.45);}
function startMusic(){
  if(bgOn)return;bgOn=true;
  try{
    var a=AC();bgGain=a.createGain();bgGain.gain.value=musicOn?0.6:0;bgGain.connect(a.destination);
    var bass=a.createOscillator(),bg=a.createGain();bass.type='sawtooth';bass.frequency.value=55;bg.gain.value=.04;bass.connect(bg);bg.connect(bgGain);bass.start();
    var melody=[261,311,349,392,466,392,349,311,261,261,311,349,392,349,311,261,349,392,466,523,466,392,349,311,261,311,349,261,261,0,311,349];
    var bass2=[130,130,155,174,196,174,155,130,130,130,155,174,196,174,155,130,174,196,233,261,233,196,174,155,130,155,174,130,130,0,155,174];
    var si=0;
    (function step(){if(!bgOn)return;
      var note=melody[si%32],b2=bass2[si%32];
      if(note>0){try{var o=a.createOscillator(),g=a.createGain();o.type='square';o.frequency.value=note;g.gain.setValueAtTime(.055,a.currentTime);g.gain.setValueAtTime(.035,a.currentTime+.05);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.11);o.connect(g);g.connect(bgGain);o.start(a.currentTime);o.stop(a.currentTime+.12);}catch(e){}}
      if(b2>0){try{var ob=a.createOscillator(),gb=a.createGain();ob.type='triangle';ob.frequency.value=b2;gb.gain.setValueAtTime(.03,a.currentTime);gb.gain.exponentialRampToValueAtTime(.001,a.currentTime+.1);ob.connect(gb);gb.connect(bgGain);ob.start(a.currentTime);ob.stop(a.currentTime+.11);}catch(e){}}
      si++;setTimeout(step,120);})();
  }catch(e){}
}

// ── COMBO ──────────────────────────────────────────────────────
// Combo süresi uzatıldı: 55 → 180 frame
var combo=0,cTimer=0,comboKills=0,comboMultiplier=1;
function getComboMultiplier(c){
  if(c>=10)return 5;if(c>=6)return 3;if(c>=4)return 2;if(c>=2)return 1.5;return 1;
}
function addComboKill(e){
  combo++;comboKills++;cTimer=180;comboMultiplier=getComboMultiplier(combo);
  var pts=Math.round(e.pts*comboMultiplier);score+=pts;
  if(combo>=4)ft(e.x,e.y-14,'x'+combo+' ×'+comboMultiplier+'!','#ff0');
  else if(combo>=2)ft(e.x,e.y-14,'COMBO x'+combo,'#fa0');
  return pts;
}

// ── ABILITY BUTTONS ──────────────────────────────────────────────
var shieldCd=0,rocketCdA=0;
// Cooldown'lar azaltıldı (daha oynanabilir)
var SHIELD_CD=300,ROCKET_CD_A=300;
var SB=document.getElementById('shieldBtn');
var RB=document.getElementById('rocketBtn');
function updateAbilityBtns(){
  var st=document.getElementById('shieldCdTxt');
  var rt=document.getElementById('rocketCdTxt');
  if(shieldCd>0){SB.classList.add('cooling');st.textContent=Math.ceil(shieldCd/60)+'s';}
  else{SB.classList.remove('cooling');st.textContent='HAZIR';}
  if(rocketCdA>0){RB.classList.add('cooling');rt.textContent=Math.ceil(rocketCdA/60)+'s';}
  else{RB.classList.remove('cooling');rt.textContent='HAZIR';}
}
SB.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();useShieldAbility();},{passive:false});
SB.addEventListener('mousedown',function(e){e.preventDefault();useShieldAbility();});
RB.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();useRocketAbility();},{passive:false});
RB.addEventListener('mousedown',function(e){e.preventDefault();useRocketAbility();});
function useShieldAbility(){
  if(shieldCd>0||state!=='play')return;
  P.shld=420;shieldCd=SHIELD_CD;
  burst(P.x,P.y,'#0ff',10);ft(P.x,P.y-30,'KALKAN!','#0ff');sPU();
}
function useRocketAbility(){
  if(rocketCdA>0||state!=='play')return;
  doBomb();rocketCdA=ROCKET_CD_A;
}

// ── JOYSTICK ──────────────────────────────────────────────────────
var JB=document.getElementById('jBase'),JK=document.getElementById('jKnob');
var jOn=false,jId=null,jOx=0,jOy=0;
var K={l:false,r:false,u:false,d:false,f:false};
function jSt(cx,cy){var r=JB.getBoundingClientRect();jOx=r.left+r.width/2;jOy=r.top+r.height/2;jOn=true;jMv(cx,cy);}
function jMv(cx,cy){if(!jOn)return;var dx=cx-jOx,dy=cy-jOy,ds=Math.sqrt(dx*dx+dy*dy);if(ds>38){dx=dx/ds*38;dy=dy/ds*38;}JK.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';K.l=dx<-8;K.r=dx>8;K.u=dy<-8;K.d=dy>8;}
function jEn(){jOn=false;jId=null;JK.style.transform='translate(-50%,-50%)';K.l=K.r=K.u=K.d=false;}
JB.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];jId=t.identifier;jSt(t.clientX,t.clientY);},{passive:false});
JB.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(t.identifier===jId)jMv(t.clientX,t.clientY);}},{passive:false});
JB.addEventListener('touchend',function(e){e.preventDefault();jEn();},{passive:false});
JB.addEventListener('mousedown',function(e){jId='m';jSt(e.clientX,e.clientY);});
window.addEventListener('mousemove',function(e){if(jId==='m')jMv(e.clientX,e.clientY);});
window.addEventListener('mouseup',function(){if(jId==='m')jEn();});
var FB=document.getElementById('fireBtn');
FB.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();K.f=true;go();},{passive:false});
FB.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();K.f=false;});
FB.addEventListener('touchcancel',function(e){e.preventDefault();K.f=false;});
FB.addEventListener('mousedown',function(e){e.preventDefault();K.f=true;go();});
FB.addEventListener('mouseup',function(){K.f=false;});
C.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];handleCanvasTap(t.clientX,t.clientY);},{passive:false});
C.addEventListener('mousedown',function(e){handleCanvasTap(e.clientX,e.clientY);});
function handleCanvasTap(cx,cy){
  var r=C.getBoundingClientRect(),x=(cx-r.left)*(W()/r.width),y=(cy-r.top)*(H()/r.height);
  if(state==='start'){
    var bs=Math.floor(W()/32),lh=bs*2.1,by=H()*.34+lh*6.3+lh*1.2;
    if(x>W()/2-65&&x<W()/2+65&&y>by&&y<by+28)toggleMusic();
    var shipY2=by+28+lh*0.6+lh*0.8;
    var cols=['red','blue','green'];
    for(var i=0;i<3;i++){
      var sx=W()/4*(i+1);
      if(Math.abs(x-sx)<28&&Math.abs(y-shipY2)<30){shipColor=cols[i];}
    }
  }
  if(state==='dead'){
    if(y>H()*0.80&&y<H()*0.90){resetAll();state='play';}
    if(y>H()*0.88&&y<H()*0.98){resetAll();state='start';}
  }
  if(state==='win'){
    var menuDelay2=WIN_LINES[WIN_LINES.length-1].delay+80;
    if(winTimer>menuDelay2){
      var bw2=Math.floor(W()*0.55),bh2=PX()*6,bx2=W()/2-bw2/2,by2b=H()*0.93-bh2;
      if(x>bx2&&x<bx2+bw2&&y>by2b&&y<by2b+bh2){resetAll();state='start';}
    }
  }
}
var paused=false,PB=document.getElementById('pauseBtn');
PB.addEventListener('click',function(){if(state==='play'){paused=!paused;PB.textContent=paused?'▶':'⏸';}});
PB.addEventListener('touchstart',function(e){e.preventDefault();if(state==='play'){paused=!paused;PB.textContent=paused?'▶':'⏸';}},{passive:false});

// ── STARS ──────────────────────────────────────────────────────
var stars=[],planets=[],astronauts=[];
function initStars(){
  stars=[];
  for(var i=0;i<110;i++)stars.push({x:Math.random()*W(),y:Math.random()*H(),s:Math.random()<.25?2:1,sp:Math.random()*.6+.2,tw:Math.random()*60});
  planets=[];
  var pd=[
    {col:'#4a6fa5',r:22,sp:.06,ring:false,detail:'earth'},
    {col:'#c8814a',r:14,sp:.10,ring:false,detail:'mars'},
    {col:'#9b6b9b',r:26,sp:.05,ring:true, detail:'plain'},
    {col:'#4a9b6b',r:11,sp:.13,ring:false,detail:'plain'},
    {col:'#e8c060',r:18,sp:.07,ring:false,detail:'plain'},
    {col:'#60a0c8',r:8, sp:.16,ring:false,detail:'plain'},
  ];
  for(var i=0;i<pd.length;i++)planets.push({
    x:Math.random()*W(),y:Math.random()*H(),
    r:pd[i].r,col:pd[i].col,sp:pd[i].sp,
    ring:pd[i].ring,detail:pd[i].detail
  });
  // Astronotlar — arka planda yavaşça süzülen pixel art
  astronauts=[];
  for(var i=0;i<3;i++){
    astronauts.push({
      x:Math.random()*W(),y:Math.random()*H(),
      vx:(Math.random()-.5)*0.12,vy:(Math.random()*.10+0.04),
      rot:(Math.random()-.5)*0.15, // hafif eğim, sürekli dönmez
      rotV:(Math.random()-.5)*0.003,
      sc:0.38+Math.random()*0.20,
      tw:Math.random()*120
    });
  }
}
initStars();

function drawAstronaut(a){
  var p=Math.max(1,Math.floor(PX()*a.sc));
  X.save();
  X.translate(Math.floor(a.x),Math.floor(a.y));
  X.rotate(a.rot);
  X.globalAlpha=0.55+0.10*Math.sin(a.tw/25);
  var lit=Math.sin(a.tw/20);

  // Kıyafet rengi
  var white='#e0e0e0';
  var white2='#c8c8c8';
  var dark='#1a1a2e';
  var red='#f03060';
  var blue='#4060d0';
  var vizorC='#1a1060';

  // ── Bacaklar ──
  pr(-p*2,p*6,p*2,p*3,white);   // sol bacak
  pr(0,p*6,p*2,p*3,white2);     // sağ bacak
  // Kırmızı kemer çizgisi (bacak arası)
  pr(-p*2,p*7.5,p*4,Math.ceil(p*0.5),red);
  // Ayaklar
  pr(-p*3,p*8.5,p*3,p,white2);
  pr(0,p*8.5,p*3,p,white2);

  // ── Gövde ──
  pr(-p*3,p*2,p*6,p*4,white);
  // Kırmızı gövde şeritleri
  pr(-p*3,p*4,p*6,Math.ceil(p*0.6),red);
  pr(-p*3,p*2.5,p*6,Math.ceil(p*0.5),red);
  // Göğüs paneli (renkli düğmeler)
  pr(-p*1.5,p*2.5,p*3,p*2,white2);
  pr(-p*1.2,p*2.8,p,Math.ceil(p*0.8),blue);   // mavi düğme
  pr(p*0.2,p*2.8,p,Math.ceil(p*0.8),red);      // kırmızı düğme

  // ── Kollar ──
  // Sol kol (serbest)
  pr(-p*5,p*2,p*2,p*2.5,white);
  pr(-p*6,p*3.5,p*2,p*2,white2);
  // Sol el (yumruk, balon tutmuyor)
  pr(-p*6.5,p*5,p*2.5,p*2,white);
  // Sağ kol (balonu tutuyor)
  pr(p*3,p*2,p*2,p*2.5,white);
  pr(p*3.5,p*3.5,p*2,p*2,white2);
  // Sağ el
  pr(p*3,p*5,p*2.5,p*2,white);

  // ── Kafa (kask) ──
  pr(-p*3,p*-4,p*6,p*6,white);   // kask dış
  pr(-p*3.5,p*-2.5,p*7,p*4,white); // kask yanlara genişler
  pr(-p*3,p*-5,p*6,p,white);     // kask üstü
  // Kask kırmızı şeritler
  pr(-p*3.5,p*0.5,p*7,Math.ceil(p*0.6),red);
  pr(-p*3.5,p*-2.5,p*7,Math.ceil(p*0.5),red);
  // Vizör (büyük oval, koyu)
  pr(-p*2,p*-3.5,p*4,p*5,vizorC);
  // Vizör iç renk (eflatun menekşe)
  pr(-p*1.5,p*-3,p*3,p*4,'#2a1866');
  // Vizör parlaması
  pr(-p*1.8,p*-3.2,p*1.2,p*1.5,'rgba(200,180,255,0.4)');
  pr(-p,p*-3.5,p*0.6,p,'rgba(255,255,255,0.3)');
  // Kask yan detaylar
  pr(-p*3.5,p*-1.5,p,p*2,'rgba(255,255,255,0.2)');

  // ── Balon (sağ elde, ipe bağlı) ──
  var bpx=p*3.5;  // balon x offset
  var bpy=-p*12;  // balon y offset (yukarıda)
  // İp
  X.strokeStyle='rgba(200,200,200,0.6)';X.lineWidth=Math.max(1,Math.ceil(p*0.3));

// Düşman grid konumlandırma — ekrana eşit yayılım
function getGridPositions(n, rowIndex, totalRows){
  var positions=[];
  var margin=Math.max(30,PX()*5);
  var availW=W()-margin*2;
  var spacing = n<=1 ? 0 : availW/(n-1);
  // Minimum aralık: 2 sprite genişliği
  var minSpacing=PX()*9;
  if(n>1&&spacing<minSpacing){
    // Sığmıyorsa ortala ve sıkıştır
    spacing=minSpacing;
    margin=(W()-(n-1)*minSpacing)/2;
  }
  var baseY=55+rowIndex*58;
  for(var i=0;i<n;i++){
    var tx = n===1 ? W()/2 : margin+i*spacing;
    tx=Math.max(margin,Math.min(W()-margin,tx));
    positions.push({tx:tx,ty:baseY});
  }
  return positions;
}

function spawnWave(w){
  enemies=[];boss=null;eBullets=[];bullets=[];rockets=[];
  spawnQueue=[];spawnTimer=0;pendingGroups=[];
  var def=WAVE_DEFS[Math.min(w-1,WAVE_DEFS.length-1)];
  if(def.boss){
    // Boss dalgasında direkt boss intro'ya geç, geri sayım yok
    introCfg=getBoss(w);
    introT=260;introActive=true;phase='bossIntro';sBossIn();
    return;
  }
  var rows=def.groups?def.groups[0].rows:def.rows;
  if(def.groups&&def.groups.length>1){
    for(var g=1;g<def.groups.length;g++)pendingGroups.push(def.groups[g].rows);
  }
  queueRows(rows,w,0);
  phase='playing';
}

function queueRows(rows,w,baseDelay){
  var delay=baseDelay;
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri],n=row.n,et=ETYPES[row.t];
    // Tüm tipler için grid konumları — iç içe girmesin
    var gridPos=getGridPositions(n,ri,rows.length);
    for(var ci=0;ci<n;ci++){
      var gp=gridPos[ci];
      var tx=gp.tx,ty=gp.ty;
      var sx,sy;
      // Başlangıç konumu: ekran dışından gelir
      if(row.t==='A'){sx=tx;sy=-40;}
      else if(row.t==='B'){sx=ci%2===0?-40:W()+40;sy=-30-ri*20;}
      else if(row.t==='C'){sx=tx;sy=-50-ci*8;} // aynı yönden sırayla gelir
      else{sx=Math.random()<0.5?-40:W()+40;sy=-20-Math.random()*40;}
      spawnQueue.push({
        delay:delay,sx:sx,sy:sy,tx:tx,ty:ty,
        type:row.t,col:et.col,pts:et.pts,mv:et.mv,
        hp:et.hp+Math.floor((w-1)/4),
        brate:Math.max(100,et.brate-w*2),
        bspd:Math.min(2.2,et.bspd+w*.04)
      });
      delay+=35+Math.random()*15;
    }
    delay+=60;
  }
}

function processSpawnQueue(){
  if(spawnQueue.length===0){
    if(pendingGroups.length>0&&enemies.length===0){
      var nextRows=pendingGroups.shift();
      spawnTimer=0;
      queueRows(nextRows,wave,0);
    }
    return;
  }
  spawnTimer++;
  for(var i=spawnQueue.length-1;i>=0;i--){
    if(spawnTimer>=spawnQueue[i].delay){
      var d=spawnQueue[i];
      var nx=d.tx,ny=d.ty;
      var minDist=PX()*9; // sprite genişliğine göre minimum mesafe
      // Mevcut düşmanlarla çakışma kontrolü
      var overlapping=true;
      var attempts=0;
      while(overlapping&&attempts<5){
        overlapping=false;
        for(var k=0;k<enemies.length;k++){
          var edx=Math.abs(enemies[k].tx-nx),edy=Math.abs(enemies[k].ty-ny);
          if(edx<minDist&&edy<minDist*0.8){overlapping=true;break;}
        }
        if(overlapping){nx+=minDist*(Math.random()<0.5?1:-1);attempts++;}
      }
      // Ekran sınırına koru
      nx=Math.max(PX()*5,Math.min(W()-PX()*5,nx));
      enemies.push({x:d.sx,y:d.sy,tx:nx,ty:ny,w:26,h:22,
        hp:d.hp,maxHp:d.hp,type:d.type,col:d.col,pts:d.pts,mv:d.mv,
        brate:d.brate,bspd:d.bspd,
        st:d.brate+Math.random()*60,
        dx:(Math.random()<.5?.5:-.5),zd:1,zt:0,ang:0,entering:true,divePhase:0});
      spawnQueue.splice(i,1);
    }
  }
}

    pr(x-p*2,y+p,Math.ceil(p*0.7),p,c1);

    pr(x+p,y+p,Math.ceil(p*0.7),p,c1);
    // Gövde kenar vurgusu
    pr(x-p*3,y-p*4,p,p,c2);        // üst sol köşe
    pr(x+p*2,y-p*4,p,p,c2);        // üst sağ köşe
  }else if(e.type==='D'){
    pr(x-p*2,y-p*5,p,p,c);pr(x+p,y-p*5,p,p,c);
    pr(x-p*2,y-p*6,p,p,'#aaff00');pr(x+p,y-p*6,p,p,'#aaff00');
    pr(x-p*2,y-p*4,p*4,p,c);pr(x-p*3,y-p*3,p*6,p*2,c);
    pr(x-p*3,y-p,p*6,p*2,c);pr(x-p*2,y+p,p*4,p,c);
    pr(x-p*2,y-p*3,p*4,p*2,'#003300');
    pr(x-p,y-p*3,p*2,p*2,fl?'#aaffaa':'#88ff88');
    pr(x-p/2,y-p*2,p,p,fl?'#fff':'#00cc00');
    pr(x-p,y,p*2,p,'#003300');
    pr(x-p*4,y-p,p,p*2,c);pr(x+p*3,y-p,p,p*2,c);
    pr(x-p*5,y-p,p,p,'#aaff00');pr(x+p*4,y-p,p,p,'#aaff00');
    pr(x-p*2,y+p,p,p*2,c);pr(x+p,y+p,p,p*2,c);
    pr(x-p*3,y+p*2,p*2,p,'#aaff00');pr(x+p,y+p*2,p*2,p,'#aaff00');
    pr(x-p/2,y-p,p,p,fl?'#ff0':'#aaff00');
  }
  // HP bar — sadece hp > 1 ise
  if(e.maxHp>2){
    X.fillStyle='#111';X.fillRect(e.x-e.w/2,e.y-e.h/2-6,e.w,3);
    X.fillStyle=e.hp/e.maxHp>.5?'#0f0':'#f80';
    X.fillRect(e.x-e.w/2,e.y-e.h/2-6,e.w*(e.hp/e.maxHp),3);
  }
}

// WARDEN — Dev kafataslı uzaylı komutanı, zırhlı omuzlar, tentakeller
function drawWardenDragon(bx,by,col,fl,ft4,p){
  var t=Date.now();
  // Animasyon titreyişleri
  var pw=Math.sin(t*0.005)*p*0.5; // kanat dalgalanma
  var pe=ft4%2===0; // göz yanıp sönme

  X.shadowColor=col;X.shadowBlur=10;

  // ── Kanatlar — yatay membran kanatlar ──
  // Sol kanat (dalgalı)
  var wx=bx-p*5+pw;
  pr(wx-p*7,by-p*3,p*7,p*2,col);
  pr(wx-p*9,by-p*1,p*9,p*2,ca(col,0.8));
  pr(wx-p*8,by+p,p*8,p*1.5,ca(col,0.6));
  pr(wx-p*10,by-p*4,p*3,p,col); // üst parmak
  pr(wx-p*7,by-p*5,p*2,p,col);
  pr(wx-p*4,by-p*4,p*2,p,col);
  // Sağ kanat
  var wx2=bx+p*5-pw;
  pr(wx2,by-p*3,p*7,p*2,col);
  pr(wx2,by-p*1,p*9,p*2,ca(col,0.8));
  pr(wx2,by+p,p*8,p*1.5,ca(col,0.6));
  pr(wx2+p*7,by-p*4,p*3,p,col);
  pr(wx2+p*2,by-p*5,p*2,p,col);
  pr(wx2-p,by-p*4,p*2,p,col);

  // ── Gövde — uzaylı karın bölgesi ──
  pr(bx-p*4,by-p*4,p*8,p*8,col);      // torso
  pr(bx-p*5,by-p*2,p*10,p*5,'#004400'); // karın yüzeyi
  pr(bx-p*4,by-p*3,p*8,p*6,'#006600'); // iç yeşil
  // Karın desenleri — alien doku
  for(var i=0;i<4;i++){
    pr(bx-p*3+i*p*1.5,by-p*2+i*p*0.5,p,Math.ceil(p*0.5),'#00ff44');
  }
  // Neon reaktör çekirdeği
  X.shadowColor='#0f0';X.shadowBlur=16;
  pr(bx-p*1.5,by-p*1,p*3,p*2,ft4<2?'#0f0':'#aaff00');
  pr(bx-p,by-p*0.5,p*2,p,fl?'#fff':'#0ff');
  X.shadowColor=col;X.shadowBlur=8;

  // ── Kafa — dev kafatası uzaylı ──
  pr(bx-p*5,by-p*12,p*10,p*8,col);   // kafa kutusu
  pr(bx-p*4,by-p*11,p*8,p*6,'#002200'); // yüz karanlığı
  // Kafa tepe çıkıntıları
  pr(bx-p*4,by-p*14,p*2,p*2,col);
  pr(bx-p,by-p*15,p*2,p*3,col);
  pr(bx+p*2,by-p*14,p*2,p*2,col);
  // Antilep boynuzları
  pr(bx-p*5,by-p*13,p,p*3,col);
  pr(bx-p*6,by-p*15,p,p*2,col);
  pr(bx+p*4,by-p*13,p,p*3,col);
  pr(bx+p*5,by-p*15,p,p*2,col);
  // Kafatası deseni (üstte)
  pr(bx-p*3,by-p*13,p,p,'#002200');
  pr(bx-p,by-p*13.5,p*2,p,'#002200');
  pr(bx+p*2,by-p*13,p,p,'#002200');

  // ── Gözler — 4 adet, üçgen dizilim ──
  X.shadowColor='#0f0';X.shadowBlur=14;
  var eyeColors=[['#0f0','#0a0'],['#aaff00','#0f0'],['#0f0','#aaff00'],['#0a0','#0f0']];
  var eyePos=[[-3,-10.5],[-1,-11.5],[1,-11.5],[3,-10.5]];
  for(var i=0;i<4;i++){
    pr(bx+eyePos[i][0]*p,by+eyePos[i][1]*p,p*1.5,p*1.5,'#000');
    pr(bx+eyePos[i][0]*p+1,by+eyePos[i][1]*p+1,p-2,p-2,pe&&i%2===0?eyeColors[i][0]:eyeColors[i][1]);
  }
  X.shadowBlur=0;
  // Ağız — uzun yatay
  pr(bx-p*3,by-p*8,p*6,p,'#000');
  for(var i=0;i<6;i++){
    pr(bx-p*3+i*p,by-p*8,Math.ceil(p*0.6),p*(i%2===0?1:0.6),i%2===0?'#0f0':'#002200');
  }

  // ── Alt tentakeller — 3 adet ──
  X.shadowColor='#0f0';X.shadowBlur=6;
  var tpos=[-p*3,0,p*3];
  for(var ti=0;ti<3;ti++){
    var tw=Math.sin(t*0.006+ti*2.1)*p*1.5;
    pr(bx+tpos[ti]-p/2,by+p*4,p,p*2+Math.abs(tw),col);
    pr(bx+tpos[ti]-p*0.8+tw/2,by+p*6+Math.abs(tw),p*1.6,p,ft4%2===ti%2?'#0f0':'#004400');
  }
  X.shadowBlur=0;
}

function drawCrusherSpider(bx,by,col,fl,ft4,p){

// NEMESIS — Dev uzaylı kral, salyangoz-böcek hibridi, çok uzuvlu
function drawNemesisBoss(bx,by,col,fl,ft4,p){
  var t=Date.now();

  pr(bx-p*3,by-p*6,p*6,p*10,'#665500'); // orta panel
  // Segment çizgileri (böcek halkalar)
  for(var i=0;i<5;i++){
    pr(bx-p*4,by-p*5+i*p*2,p*8,Math.ceil(p*0.5),'#332200');
    pr(bx-p*3,by-p*4.5+i*p*2,p*6,Math.ceil(p*0.3),ca(nCol,0.4));
  }

  // ── Kafa — uzaylı böcek kafası ──
  pr(bx-p*4,by-p*18,p*8,p*10,nCol);   // kafa
  pr(bx-p*3,by-p*17,p*6,p*8,'#443300'); // yüz paneli
  pr(bx-p*5,by-p*20,p*10,p*2,nCol);   // alın
  // Mandibles (çenenin iki yanı)
  pr(bx-p*7,by-p*15,p*3,p*5,nCol);
  pr(bx+p*4,by-p*15,p*3,p*5,nCol);
  pr(bx-p*8,by-p*12,p*2,p*4,nCol);
  pr(bx+p*6,by-p*12,p*2,p*4,nCol);
  X.shadowColor='#f80';X.shadowBlur=10;
  pr(bx-p*9,by-p*11,p*2,p,ft4<2?'#f80':'#ff0'); // mandible uç sol
  pr(bx+p*7,by-p*11,p*2,p,ft4<2?'#ff0':'#f80'); // mandible uç sağ
  X.shadowColor=nCol;X.shadowBlur=10;
  // Kafa boynuzları — üstte
  pr(bx-p*3,by-p*22,p,p*4,nCol);
  pr(bx+p*2,by-p*22,p,p*4,nCol);
  pr(bx-p*2,by-p*24,p,p*2,nCol);
  pr(bx+p,by-p*24,p,p*2,nCol);
  // Boynuz ucu parlaması
  X.shadowColor='#ff0';X.shadowBlur=12;
  pr(bx-p*3,by-p*26,p*2,p,fl?'#ff0':'nCol');
  pr(bx+p*2,by-p*26,p*2,p,fl?nCol:'#ff0');
  X.shadowColor=nCol;X.shadowBlur=8;

  // ── Bileşik gözler — altıgen ızgara ──
  X.shadowColor='#f00';X.shadowBlur=16;
  // Sol göz bölgesi
  var lEyePos=[[-3.5,-17],[-2.5,-16],[-4,-16],[-3,-15],[-2,-15]];
  for(var i=0;i<lEyePos.length;i++){
    pr(bx+lEyePos[i][0]*p,by+lEyePos[i][1]*p,p,p,ft4===i%4?'#f00':'#700');
  }
  // Sağ göz bölgesi
  var rEyePos=[[2.5,-17],[1.5,-16],[3,-16],[2,-15],[1,-15]];
  for(var i=0;i<rEyePos.length;i++){
    pr(bx+rEyePos[i][0]*p,by+rEyePos[i][1]*p,p,p,ft4===i%4?'#ff4':'#770');
  }
  X.shadowBlur=0;

  // ── 3 çift kol (6 kol) ──
  X.shadowColor=nCol;X.shadowBlur=6;
  var armData=[
    [-5,-2, -9,-5, -13,-4],
    [-5,0,  -9,2,  -13,5],
    [-5,2,  -9,6,  -12,10],
    [4,-2,  8,-5,  12,-4],
    [4,0,   8,2,   12,5],
    [4,2,   8,6,   11,10],
  ];
  for(var ai=0;ai<armData.length;ai++){
    var A=armData[ai];
    X.strokeStyle=nCol;X.lineWidth=Math.ceil(p*(ai<3?1.2:1.0));
    X.beginPath();X.moveTo(bx+A[0]*p,by+A[1]*p);X.lineTo(bx+A[2]*p,by+A[3]*p);X.stroke();

    X.beginPath();X.moveTo(bx+A[2]*p,by+A[3]*p);X.lineTo(bx+A[4]*p,by+A[5]*p);X.stroke();
    // Eklem nokta
    pr(bx+A[2]*p-p/2,by+A[3]*p-p/2,p,p,'#fff');
    // Kol ucu (çatal pençe)
    X.strokeStyle=ft4%2===0?'#ff0':nCol;X.lineWidth=Math.ceil(p*0.6);
    X.beginPath();X.moveTo(bx+A[4]*p,by+A[5]*p);X.lineTo(bx+(A[4]+Math.sign(A[4]))*p,by+(A[5]+1.5)*p);X.stroke();
    X.beginPath();X.moveTo(bx+A[4]*p,by+A[5]*p);X.lineTo(bx+(A[4]+Math.sign(A[4]))*p,by+(A[5]-0.5)*p);X.stroke();
  }

  // ── Karın reaktörü ──
  X.shadowColor='#f80';X.shadowBlur=18;
  pr(bx-p*2,by-p,p*4,p*4,ft4<2?'#f80':'#ff4400');

}

// OMEGA — Antik uzaylı tanrısı, yüzen biyolojik varlık
function drawOmegaBoss(bx,by,cfg,fl,ft4,p){
  var t=Date.now();
  var col=cfg.col||'#f00';
  var rot2=cfg.rot||0;

  // ── Yörünge halkaları — dönen enerji hatları ──
  X.save();X.translate(bx,by);
  X.strokeStyle=ca(col,0.5);X.lineWidth=p*0.8;X.shadowBlur=10;X.shadowColor=col;
  X.rotate(rot2*0.7);
  X.beginPath();X.ellipse(0,0,p*13,p*7,0,0,Math.PI*2);X.stroke();
  X.rotate(-rot2*1.4);
  X.beginPath();X.ellipse(0,0,p*11,p*5,Math.PI/3,0,Math.PI*2);X.stroke();
  // Yörüngede enerji kürecikleri
  for(var i=0;i<4;i++){
    var oa=i*(Math.PI/2)+rot2;
    var orx=Math.cos(oa)*p*12,ory=Math.sin(oa)*p*6;
    X.fillStyle=ft4===i?'#fff':col;X.shadowBlur=8;
    X.fillRect(orx-p/2,ory-p/2,p,p);
  }
  X.restore();X.shadowBlur=0;

  // ── Ana gövde — biyolojik uzaylı ──
  // Pulsing outer membrane
  var pulse=Math.sin(t*0.006)*p*0.5;
  X.shadowColor=col;X.shadowBlur=16;
  pr(bx-p*7+pulse,by-p*9,p*14-pulse*2,p*18,col);
  pr(bx-p*8,by-p*6,p*16,p*10,'#1a0000');
  pr(bx-p*6,by-p*8,p*12,p*16,'#2d0000');
  pr(bx-p*5,by-p*7,p*10,p*14,'#440000');
  // Biyolojik doku deseni (dikey damarlar)
  X.shadowBlur=6;
  for(var i=0;i<5;i++){
    var dv=0.15+0.1*Math.sin(t*0.005+i);
    pr(bx-p*4+i*p*2,by-p*6,Math.ceil(p*0.5),p*12,ca(col,dv));
  }
  // Yatay damarlar
  for(var i=0;i<6;i++){
    pr(bx-p*5,by-p*6+i*p*2,p*10,Math.ceil(p*0.4),ca(col,0.1+0.08*Math.sin(t*0.004+i)));
  }

  // ── Üç büyük göz — üçgen dizilim, en korkutucu ──
  X.shadowColor='#f00';X.shadowBlur=22;
  // Sol göz
  pr(bx-p*5,by-p*7,p*4,p*5,'#000');
  pr(bx-p*4.5,by-p*6.5,p*3,p*4,ft4<2?'#800':'#600');
  pr(bx-p*4,by-p*6,p*2,p*3,ft4<2?'#f00':'#aa0000');
  pr(bx-p*3.5,by-p*5.5,p,p*2,fl?'#fff':'#ff4');
  // Sağ göz
  pr(bx+p,by-p*7,p*4,p*5,'#000');
  pr(bx+p*1.5,by-p*6.5,p*3,p*4,ft4<2?'#600':'#800');
  pr(bx+p*2,by-p*6,p*2,p*3,ft4<2?'#aa0000':'#f00');
  pr(bx+p*2.5,by-p*5.5,p,p*2,fl?'#ff4':'#fff');
  // Orta alt göz — en büyük, en korkunç
  X.shadowBlur=28;
  pr(bx-p*2.5,by-p*2,p*5,p*6,'#000');
  pr(bx-p*2,by-p*1.5,p*4,p*5,ft4<2?'#f00':'#cc0000');
  pr(bx-p*1.5,by-p,p*3,p*4,ft4<2?'#ff2200':'#f00');
  pr(bx-p,by-p*0.5,p*2,p*3,ft4%2===0?'#fff':'#ff4');
  pr(bx-p*0.5,by,p,p*2,fl?'#fff':'#ff0');
  X.shadowColor=col;X.shadowBlur=10;

  // ── Ağız — iri, enerjili ──
  pr(bx-p*4,by+p*4,p*8,p*2,'#000');
  for(var i=0;i<8;i++){
    pr(bx-p*4+i*p,by+p*4,p,p*(i%2===0?1.5:1),i%2===0?col:'#220000');
    pr(bx-p*4+i*p,by+p*5.5,p,p*(i%2===0?1:1.5),'#220000');
  }
  X.shadowColor='#f00';X.shadowBlur=12;
  pr(bx-p*3,by+p*4.5,p*6,p,ft4<2?'rgba(255,50,0,0.7)':'rgba(200,0,0,0.5)');

  // ── 6 tentakül kol — her biri ayrı dalga ──
  var tentDirs=[
    {sx:-p*6,sy:p*1, wave:0.8},
    {sx:-p*5,sy:p*3, wave:1.4},
    {sx:-p*4,sy:p*5, wave:2.0},
    {sx:p*5, sy:p*1, wave:0.6},
    {sx:p*4, sy:p*3, wave:1.2},
    {sx:p*3, sy:p*5, wave:1.8},
  ];
  for(var ti=0;ti<6;ti++){
    var td=tentDirs[ti];
    var tw=Math.sin(t*0.005+td.wave)*p*2;
    var side=ti<3?-1:1;
    X.strokeStyle=col;X.lineWidth=Math.ceil(p*(1.6-ti*0.1));X.shadowBlur=6;X.shadowColor=col;
    X.beginPath();
    X.moveTo(bx+td.sx,by+td.sy);
    X.bezierCurveTo(
      bx+td.sx+side*p*3,by+td.sy+p*3+tw,
      bx+td.sx+side*p*6,by+td.sy+p*6+tw*0.7,
      bx+td.sx+side*p*9,by+td.sy+p*9+tw*0.4
    );X.stroke();
    // Tentakül ucu (silahlı)
    var ex=bx+td.sx+side*p*9,ey=by+td.sy+p*9+tw*0.4;
    X.fillStyle=ft4===ti%4?'#fff':col;X.shadowBlur=8;
    X.fillRect(ex-p,ey-p,p*2,p*2);
    X.fillRect(ex+side*p-p/2,ey-p*2,p,p);
  }

  // ── Dışarı çıkan kafatası çıkıntılar ──
  X.shadowColor=col;X.shadowBlur=8;
  for(var i=0;i<3;i++){
    pr(bx-p*8-i*p*0.5,by-p*3+i*p*2,p*(3-i),p*(1.5-i*0.3),col);
    pr(bx+p*5+i*p*0.5,by-p*3+i*p*2,p*(3-i),p*(1.5-i*0.3),col);
  }
  X.shadowBlur=0;
}

function drawBossSprite(bx,by,cfg,scale){
  var p=PX()*0.85*(scale||1); // büyüklük küçültüldü
  var col=(cfg.col||'#f80');
  var design=(cfg.design||'dragon');
  var fl=Math.floor(Date.now()/80)%2;
  var ft4=Math.floor(Date.now()/60)%4;
  X.shadowBlur=8;X.shadowColor=col;

  if(design==='dragon'){
    drawWardenDragon(bx,by,col,fl,ft4,p);
  }else if(design==='spider'){
    drawCrusherSpider(bx,by,col,fl,ft4,p);
  }else if(design==='nemesis'){
    drawNemesisBoss(bx,by,col,fl,ft4,p);
  }else{
    drawOmegaBoss(bx,by,cfg,fl,ft4,p);
  }
  X.shadowBlur=0;
}

// ── BOSS HEALTH BAR — Ekranın ÜSTÜNDE, şık retro tasarım ──
function drawBossHealthBar(){
  if(!boss)return;
  var ph=boss.hp/boss.mhp;
  var px=PX();
  var cw=W();
  var barW=Math.floor(cw*0.70);
  var bx=cw/2-barW/2;
  var barY=3;
  var barH=px*2;
  var nameH=px*3;
  // Koyu arka plan paneli
  X.fillStyle='rgba(0,0,0,0.85)';
  X.fillRect(bx-px*2,barY-px,barW+px*4,nameH+barH+px*3);
  // Panel kenarlığı (pixel köşeler)
  X.fillStyle=boss.col;
  X.fillRect(bx-px*2,barY-px,px,px);          // sol üst köşe
  X.fillRect(bx+barW+px,barY-px,px,px);        // sağ üst köşe
  X.fillRect(bx-px*2,barY+nameH+barH+px,px,px);// sol alt köşe
  X.fillRect(bx+barW+px,barY+nameH+barH+px,px,px);// sağ alt köşe
  // Üst kenar çizgisi
  X.fillStyle=ca(boss.col,0.6);
  X.fillRect(bx-px,barY-px,barW+px*2,Math.ceil(px/2));
  // Boss adı — merkezde, renkli
  X.textAlign='center';
  X.font='bold '+Math.floor(cw/32)+'px Courier New';
  X.shadowBlur=6;X.shadowColor=boss.col;
  X.fillStyle=boss.col;
  X.fillText('[ '+boss.name+' ]',cw/2,barY+nameH-px*0.5);
  X.shadowBlur=0;
  // Bar arka planı
  X.fillStyle='#0a0a0a';
  X.fillRect(bx,barY+nameH,barW,barH);
  // Segmentli HP bar
  var segW=Math.max(2,Math.floor(px*2.5));
  var segGap=Math.ceil(px*0.4);
  var totalSegs=Math.floor(barW/(segW+segGap));
  var filledSegs=Math.round(totalSegs*ph);
  var segCol=ph>.6?'#00ff44':ph>.3?'#ffaa00':'#ff2200';
  for(var si=0;si<totalSegs;si++){
    var sx=bx+si*(segW+segGap);
    if(si<filledSegs){
      X.fillStyle=segCol;
      X.fillRect(sx,barY+nameH,segW,barH);
      // Üst parlama
      X.fillStyle='rgba(255,255,255,0.3)';
      X.fillRect(sx,barY+nameH,segW,Math.ceil(barH/3));
    }else{
      X.fillStyle='#111';
      X.fillRect(sx,barY+nameH,segW,barH);
    }
  }
  // Alt kenar çizgisi
  X.fillStyle=ca(boss.col,0.4);
  X.fillRect(bx-px,barY+nameH+barH,barW+px*2,Math.ceil(px/2));
  // HP yüzdesi — sağ üstte
  X.font=Math.floor(cw/42)+'px Courier New';
  X.fillStyle='#777';X.textAlign='right';
  X.fillText(Math.ceil(ph*100)+'%',bx+barW+px,barY+nameH-px*0.5);
  X.textAlign='left';X.shadowBlur=0;
}

function drawBoss(){
  if(!boss)return;
  boss.rot=(boss.rot||0)+.018;boss.tick=(boss.tick||0)+1;
  drawBossSprite(Math.floor(boss.x),Math.floor(boss.y),boss,1);

  // Laser efekti
  if(boss.la){X.save();X.strokeStyle='rgba(255,40,40,'+(0.5+0.5*Math.sin(Date.now()/35))+')';X.lineWidth=PX()*3;X.shadowBlur=18;X.shadowColor='#f00';X.beginPath();X.moveTo(boss.lx,boss.y+boss.h/2);X.lineTo(boss.lx,H());X.stroke();X.restore();}
  if(boss.lc>0&&!boss.la){X.save();X.strokeStyle='rgba(255,100,100,'+(boss.lc/120)+')';X.lineWidth=PX();X.setLineDash([PX()*2,PX()*2]);X.beginPath();X.moveTo(boss.x,boss.y+boss.h/2);X.lineTo(boss.x,H());X.stroke();X.setLineDash([]);X.restore();}
}

// ── BOSS INTRO ──────────────────────────────────────────────────
// introT: 260→0. Info ekranı: 260→120 arası. Boss animasyonu: 120→0.
// OMEGA intro özel: kızıl gezegenden fırlatma animasyonu (uzun sinematik).
function drawBossIntroScreen(){
  var cw=W(),ch=H(),px=PX();
  var t=introT;
  var col=introCfg.col;
  var nm=introCfg.name;
  var isOmega=(nm==='OMEGA');
  // OMEGA için animasyon fazı daha uzun (120 frame)
  var animThreshold=isOmega?120:60;

  X.fillStyle='#000';X.fillRect(0,0,cw,ch);
  drawStars();

  // ── INFO PHASE ──────────────────────────────────────────────
  if(t>animThreshold){
    var totalInfo=260-animThreshold;
    var prog=(260-t)/totalInfo; // 0→1
    if(prog<0)prog=0;if(prog>1)prog=1;

    X.fillStyle='rgba(0,0,'+(isOmega?'0':'10')+','+(0.1+prog*0.80)+')';X.fillRect(0,0,cw,ch);

    X.globalAlpha=0.06;X.fillStyle=col;
    for(var i=0;i<ch;i+=4)X.fillRect(0,i,cw,2);
    X.globalAlpha=1;

    var cb=px*5;
    X.fillStyle=col;
    X.fillRect(0,0,cb,px);X.fillRect(0,0,px,cb);
    X.fillRect(cw-cb,0,cb,px);X.fillRect(cw-px,0,px,cb);
    X.fillRect(0,ch-px,cb,px);X.fillRect(0,ch-cb,px,cb);
    X.fillRect(cw-cb,ch-px,cb,px);X.fillRect(cw-px,ch-cb,px,cb);

    // BOSS YAKLAŞIYOR
    if(prog<0.20&&Math.floor(t/8)%2===0){
      X.textAlign='center';X.fillStyle='#f00';X.shadowBlur=10;X.shadowColor='#f00';
      X.font='bold '+Math.floor(cw/19)+'px Courier New';
      X.fillText('!! BOSS YAKLAŞIYOR !!',cw/2,ch*0.13);X.shadowBlur=0;
    }

    // Boss ismi
    var nameProg=prog<0.05?0:Math.min(1,(prog-0.05)/0.45);
    if(nameProg>0){
      var fs=Math.floor(cw/5.5);
      X.font='bold '+fs+'px Courier New';
      X.textBaseline='middle';X.textAlign='center';
      var targetY=ch*0.36;
      var slideY=(targetY-fs)+(fs)*nameProg;
      X.fillStyle='rgba(0,0,0,0.85)';X.fillText(nm,cw/2+2,slideY+2);
      X.fillStyle=col;X.shadowBlur=Math.round(nameProg*28);X.shadowColor=col;
      X.fillText(nm,cw/2,slideY);X.shadowBlur=0;
      X.textBaseline='alphabetic';
      if(nameProg>0.85){
        X.globalAlpha=Math.min(1,(nameProg-0.85)*7);X.fillStyle=col;
        X.fillRect(cw*0.08,slideY+fs*0.55,cw*0.84,px*0.7);X.globalAlpha=1;
      }
    }

    // OMEGA — büyük kızıl gezegen gösterimi info ekranında
    if(isOmega&&prog>0.20){
      var pA=Math.min(1,(prog-0.20)*1.5);
      var pR2=Math.min(cw,ch)*0.13;
      var pXo=cw*0.20,pYo=ch*0.65;
      X.globalAlpha=pA*0.95;
      X.shadowBlur=pR2;X.shadowColor='#800';
      var atmGi=X.createRadialGradient(pXo,pYo,pR2*0.4,pXo,pYo,pR2*2);
      atmGi.addColorStop(0,'rgba(255,60,0,0)');atmGi.addColorStop(1,'rgba(150,0,0,0.4)');
      X.fillStyle=atmGi;X.beginPath();X.arc(pXo,pYo,pR2*2,0,Math.PI*2);X.fill();
      var grdI=X.createRadialGradient(pXo-pR2*0.3,pYo-pR2*0.3,pR2*0.05,pXo,pYo,pR2);
      grdI.addColorStop(0,'#dd3520');grdI.addColorStop(0.4,'#8b1a0a');grdI.addColorStop(1,'#2a0500');
      X.fillStyle=grdI;X.beginPath();X.arc(pXo,pYo,pR2,0,Math.PI*2);X.fill();
      // Lav kanalları
      for(var li=0;li<5;li++){
        var laA=li*(Math.PI/2.5)+Date.now()*0.0008;
        X.strokeStyle='rgba(255,'+(40+li*20)+',0,'+(0.25+0.1*Math.sin(Date.now()/120+li))+')';
        X.lineWidth=px;X.beginPath();X.arc(pXo,pYo,pR2*(0.4+li*0.1),laA,laA+1.0);X.stroke();
      }
      X.fillStyle='rgba(0,0,0,0.55)';
      X.beginPath();X.arc(pXo-pR2*0.28,pYo-pR2*0.12,pR2*0.22,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(pXo+pR2*0.32,pYo+pR2*0.30,pR2*0.15,0,Math.PI*2);X.fill();
      X.fillStyle='rgba(255,140,100,0.20)';
      X.beginPath();X.arc(pXo-pR2*0.30,pYo-pR2*0.30,pR2*0.42,0,Math.PI*2);X.fill();
      X.shadowColor='#f60';X.shadowBlur=8;
      X.fillStyle='rgba(255,70,0,'+(0.35+0.2*Math.sin(Date.now()/160))+')';
      X.beginPath();X.arc(pXo+pR2*0.12,pYo+pR2*0.22,pR2*0.25,0,Math.PI*2);X.fill();
      X.shadowBlur=0;X.globalAlpha=1;
      X.globalAlpha=pA;
      X.fillStyle='#c44';X.font=Math.floor(cw/42)+'px Courier New';X.textAlign='center';
      X.fillText('KIZIL GEZEGEN',pXo,pYo+pR2*1.2+px*2);
      X.globalAlpha=1;
    }

    // Pattern & HP
    if(prog>0.48){
      var ial=Math.min(1,(prog-0.48)*2.5);
      X.globalAlpha=ial;X.textAlign='center';
      var pd={spiral:'[ ATEŞLİ SPIRAL ]',wave:'[ ÖRÜMCEKAĞI ]',cross:'[ YILDIZ FIRTINASI ]',omega:'[ OMEGA PROTOKOLÜ ]'};
      X.fillStyle=isOmega?'#f88':'#888';X.font=Math.floor(cw/34)+'px Courier New';
      X.fillText(pd[introCfg.pattern]||'',cw/2,ch*0.52);
      var hbw=Math.floor(cw*0.56),hbh=px*3,hbx=cw/2-hbw/2,hby=ch*0.58;
      X.strokeStyle=col;X.lineWidth=px*0.5;X.strokeRect(hbx,hby,hbw,hbh);
      X.fillStyle=ca(col,0.13);X.fillRect(hbx,hby,hbw,hbh);
      X.fillStyle=col;X.fillRect(hbx,hby,Math.min(1,(prog-0.48)*3.5)*hbw,hbh);
      X.fillStyle='#ccc';X.font=Math.floor(cw/42)+'px Courier New';
      X.fillText('HP: '+introCfg.hp,cw/2,hby+hbh*0.85);
      X.globalAlpha=1;
    }

    // HAZIR OL
    if(prog>0.72){
      var hal=Math.min(1,(prog-0.72)*4);
      var bk=Math.floor(t/9)%2===0;
      X.globalAlpha=hal;
      X.fillStyle=bk?ca(col,0.25):'rgba(0,0,0,0.7)';
      X.fillRect(cw/2-80,ch*0.70,160,px*5);
      X.strokeStyle=bk?'#fff':col;X.lineWidth=bk?px*0.8:px*0.4;
      X.strokeRect(cw/2-80,ch*0.70,160,px*5);
      X.fillStyle=bk?'#fff':col;
      X.font='bold '+Math.floor(cw/23)+'px Courier New';X.textAlign='center';
      X.shadowBlur=bk?12:0;X.shadowColor='#fff';
      X.fillText('HAZIR OL!',cw/2,ch*0.70+px*5*0.70);
      X.shadowBlur=0;X.globalAlpha=1;
    }

  // ── BOSS ANIMATION PHASE ──────────────────────────────────
  }else{
    var ep=(animThreshold-t)/animThreshold; // 0→1

    if(isOmega){
      // OMEGA — 120 frame'lik sinematik: kızıl gezegenden epik fırlatma
      // Evre 1 (ep 0-0.35): Gezegen titrer, lav fışkırır, ses efekti
      // Evre 2 (ep 0.35-0.65): OMEGA yavaşça yükselir, atmosfer parçalanır
      // Evre 3 (ep 0.65-1.0): OMEGA hızla uçar yukarı, gezegen parlıyor

      var pR3=Math.min(cw,ch)*0.25;
      // Gezegen yukarı çıkmaz, ekranın alt yarısında sabit — dramatik
      var shake=(ep<0.35)?Math.floor(Math.sin(ep*80)*3*(1-ep/0.35)*3):0;
      var pXc=cw/2+shake,pYc=ch*0.78;

      // Atmosfer kızarması
      var atmIntensity=ep<0.35?ep/0.35:1.0;
      X.fillStyle='rgba('+(Math.floor(60+atmIntensity*80))+',0,0,'+(0.3+ep*0.5)+')';X.fillRect(0,0,cw,ch);

      // Lav parçacıkları — evre 1'de yoğun
      if(ep<0.65&&Math.random()<(ep<0.35?0.85:0.5)){
        var lavX=pXc+(Math.random()-.5)*pR3*1.5;
        var lavY=pYc-pR3*0.5+Math.random()*pR3*0.6;
        parts.push({x:lavX,y:lavY,
          vx:(Math.random()-.5)*4,vy:-(Math.random()*5+2),
          life:30+Math.random()*25,
          col:Math.random()<0.4?'#fff':Math.random()<0.5?'#f60':'#ff0',
          r:px*(Math.random()*2.5+0.5)});
      }
      // Kıvılcımlar — büyük parçacıklar
      if(ep>0.20&&ep<0.70&&Math.random()<0.4){
        parts.push({x:pXc+(Math.random()-.5)*pR3*2,y:pYc-pR3*(0.3+Math.random()*0.4),
          vx:(Math.random()-.5)*6,vy:-(Math.random()*8+4),
          life:40+Math.random()*20,col:'#ff4',r:px*(Math.random()*1.5+1)});
      }

      // Gezegen çizimi
      X.save();X.translate(shake*0.3,0);
      X.shadowBlur=pR3*0.6+ep*pR3*0.5;X.shadowColor='#900';
      var atmG3=X.createRadialGradient(pXc,pYc,pR3*0.5,pXc,pYc,pR3*2.0);
      atmG3.addColorStop(0,'rgba(255,40,0,0)');atmG3.addColorStop(1,'rgba(180,0,0,'+(0.3+ep*0.3)+')');
      X.fillStyle=atmG3;X.beginPath();X.arc(pXc,pYc,pR3*2.0,0,Math.PI*2);X.fill();
      var grd3=X.createRadialGradient(pXc-pR3*0.3,pYc-pR3*0.3,pR3*0.05,pXc,pYc,pR3);
      grd3.addColorStop(0,'#dd3520');grd3.addColorStop(0.5,'#8b1a0a');grd3.addColorStop(1,'#3a0800');
      X.fillStyle=grd3;X.beginPath();X.arc(pXc,pYc,pR3,0,Math.PI*2);X.fill();
      // Lav kanalları — parlayan
      for(var li=0;li<8;li++){
        var la3=li*(Math.PI/4)+Date.now()*0.002;
        var lIntens=0.2+ep*0.35+0.15*Math.sin(Date.now()/80+li);
        X.strokeStyle='rgba(255,'+(40+li*18)+',0,'+lIntens+')';
        X.lineWidth=px*(1.5-li*0.1);
        X.beginPath();X.arc(pXc,pYc,pR3*(0.35+li*0.08),la3,la3+1.2);X.stroke();
      }
      X.fillStyle='rgba(0,0,0,0.5)';
      X.beginPath();X.arc(pXc-pR3*0.3,pYc-pR3*0.15,pR3*0.22,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(pXc+pR3*0.35,pYc+pR3*0.28,pR3*0.16,0,Math.PI*2);X.fill();
      X.shadowBlur=0;X.restore();

      // OMEGA sprite — yükseliş animasyonu
      if(ep>0.15){
        var riseEp=(ep-0.15)/0.85;
        var easedRise;
        if(riseEp<0.5){easedRise=riseEp*riseEp*2;}  // yavaş başla
        else{easedRise=1-Math.pow(1-(riseEp-0.5)*2,2)*0.5;} // hızlan
        var omY=pYc-pR3*0.2-(ch*1.0)*easedRise;
        var omX=pXc;

        // Motor alevi — büyük, dramatik
        if(riseEp<0.9){
          var fBaseLen=px*(10+Math.random()*8);
          var fLen2=fBaseLen*(1-easedRise*0.5);
          var fA=0.9-riseEp*0.4;
          // Büyük dış alev
          X.fillStyle='rgba(255,40,0,'+fA*0.6+')';
          X.beginPath();X.moveTo(omX-px*6,omY+px*5);X.lineTo(omX,omY+px*5+fLen2*1.5);X.lineTo(omX+px*6,omY+px*5);X.closePath();X.fill();
          // İç alev
          X.fillStyle='rgba(255,140,0,'+fA*0.8+')';
          X.beginPath();X.moveTo(omX-px*3.5,omY+px*5);X.lineTo(omX,omY+px*5+fLen2*1.0);X.lineTo(omX+px*3.5,omY+px*5);X.closePath();X.fill();
          // Parlak çekirdek
          X.fillStyle='rgba(255,255,200,'+fA+')';
          X.beginPath();X.moveTo(omX-px*1.5,omY+px*5);X.lineTo(omX,omY+px*5+fLen2*0.5);X.lineTo(omX+px*1.5,omY+px*5);X.closePath();X.fill();
          // Yoğun iz parçacıkları
          for(var pi=0;pi<3;pi++){
            parts.push({x:omX+(Math.random()-.5)*px*8,y:omY+px*6+Math.random()*fLen2*0.5,
              vx:(Math.random()-.5)*3,vy:Math.random()*3+1,
              life:35+Math.random()*20,col:Math.random()<0.4?'#ff4':Math.random()<0.5?'#f80':'rgba(255,100,0,0.6)',
              r:px*(Math.random()*2+0.8)});
          }
        }

        X.globalAlpha=Math.min(1,riseEp*3);
        X.shadowBlur=22;X.shadowColor=col;
        drawBossSprite(Math.floor(omX),Math.floor(omY),introCfg,1);
        X.shadowBlur=0;X.globalAlpha=1;
      }

      // İsim — ep 0-0.3 arası görünür, sonra solar
      X.globalAlpha=Math.max(0,1-ep*3.5);
      X.textAlign='center';X.textBaseline='middle';
      X.fillStyle=col;X.shadowBlur=18;X.shadowColor=col;
      X.font='bold '+Math.floor(cw/5.5)+'px Courier New';
      X.fillText(nm,cw/2,ch*0.36);
      X.shadowBlur=0;X.globalAlpha=1;X.textBaseline='alphabetic';

      // Evre 1: titreme mesajı
      if(ep<0.30&&Math.floor(t/7)%2===0){
        X.textAlign='center';X.fillStyle='#f88';
        X.font='bold '+Math.floor(cw/26)+'px Courier New';
        X.shadowBlur=8;X.shadowColor='#f00';
        X.fillText('GEZEGEN ÇÖKÜYOR!',cw/2,ch*0.20);X.shadowBlur=0;
      }

    }else{
      // Normal boss — yukarıdan girer
      var ease2=1-Math.pow(1-ep,2.5);
      var entY=-100+(ch*0.22+100)*ease2;
      var bx2b=Math.floor(cw/2),by2b=Math.floor(entY);

      if(by2b>-60){
        var beamG2=X.createLinearGradient(bx2b,by2b-60,bx2b,by2b+40);
        beamG2.addColorStop(0,'rgba(0,0,0,0)');beamG2.addColorStop(1,ca(col,0.35));
        X.fillStyle=beamG2;X.fillRect(bx2b-px*8,by2b-60,px*16,100);
      }

      X.shadowBlur=20;X.shadowColor=col;
      X.globalAlpha=Math.min(1,ep*5);
      drawBossSprite(bx2b,by2b,introCfg,1);
      X.shadowBlur=0;X.globalAlpha=1;

      X.globalAlpha=Math.max(0,1-ep*3.5);
      X.textAlign='center';X.textBaseline='middle';
      X.fillStyle=col;X.shadowBlur=16;X.shadowColor=col;
      X.font='bold '+Math.floor(cw/5.5)+'px Courier New';

function bossShoot(){
  if(!boss||boss.entering||boss.st>0){if(boss&&boss.st>0)boss.st--;return;}
  var ph=boss.hp/boss.mhp,ang=Math.atan2(P.y-boss.y,P.x-boss.x);
  boss.sc=(boss.sc||0)+1;
  var bc=boss.col;
  if(boss.pattern==='spiral'){
    boss.spiralAng=(boss.spiralAng||ang);
    boss.spiralAng+=ph>.66?.18:ph>.33?.25:.32;
    var spd=ph>.66?1.4:ph>.33?1.7:2.0;
    var arms=ph>.66?2:ph>.33?3:4;
    for(var i=0;i<arms;i++){
      var a=boss.spiralAng+i*(Math.PI*2/arms);
      if(Math.sin(a)>-0.1)
        eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:true,bt:'warden_fire',bc:bc,rot:a});
    }
    if(boss.sc%9===0){
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang)*1.8,vy:Math.sin(ang)*1.8,r:true,bt:'warden_aimed',bc:bc,rot:ang});
    }
    boss.st=ph>.66?60:ph>.33?45:32;
  }else if(boss.pattern==='wave'){
    boss.waveT=(boss.waveT||0)+1;
    var wSpd=ph>.66?1.5:ph>.33?1.8:2.1;
    var sweep=Math.sin(boss.waveT*0.06)*0.5;
    for(var i=-1;i<=1;i++){
      var a=Math.PI/2+sweep+i*0.22;
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(a)*wSpd,vy:Math.sin(a)*wSpd,r:true,bt:'crusher_web',bc:bc});
    }
    if(boss.sc%5===0){
      var off=0.28;
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang-off)*wSpd,vy:Math.sin(ang-off)*wSpd,r:true,bt:'crusher_web',bc:bc});
      eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang+off)*wSpd,vy:Math.sin(ang+off)*wSpd,r:true,bt:'crusher_web',bc:bc});
    }
    boss.st=ph>.66?65:ph>.33?50:35;
  }else if(boss.pattern==='cross'){
    var cSpd=ph>.66?1.5:ph>.33?1.8:2.1;
    var diags=[Math.PI/4,Math.PI*3/4,Math.PI*5/4,Math.PI*7/4];
    for(var i=0;i<diags.length;i++){
      var a=diags[i]+(boss.sc*.05);
      eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*cSpd,vy:Math.sin(a)*cSpd,r:true,bt:'nemesis_star',bc:bc,rot:a});
    }
    eBullets.push({x:boss.x,y:boss.y+boss.h/2,vx:Math.cos(ang)*cSpd,vy:Math.sin(ang)*cSpd,r:true,bt:'nemesis_aimed',bc:bc,rot:ang});
    if(ph<.33){
      boss.sa=(boss.sa||0)+.18;
      for(var i=0;i<3;i++){
        var a2=boss.sa+i*(Math.PI*2/3);
        if(Math.sin(a2)>-.15)
          eBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a2)*1.6,vy:Math.sin(a2)*1.6,r:true,bt:'nemesis_star',bc:bc,rot:a2});
      }
    }
    boss.st=ph>.66?55:ph>.33?42:28;
  }
  if(ph<.66&&boss.ph===1){boss.ph=2;ft(boss.x,boss.y-28,'PHASE 2!',boss.col);ring(boss.x,boss.y,boss.col);sBossPhase();}
  if(ph<.33&&boss.ph===2){boss.ph=3;ft(boss.x,boss.y-28,'PHASE 3!','#f55');ring(boss.x,boss.y,'#f55');sBossPhase();}
}

function bossShootOmega(){

function updateRockets(){
  for(var i=rockets.length-1;i>=0;i--){
    var rk=rockets[i];
    if(rk.exploded){rk.timer++;if(rk.timer>30)rockets.splice(i,1);continue;}
    rk.y+=rk.vy;
    var hit=false;
    for(var j=0;j<enemies.length;j++)if(Math.hypot(enemies[j].x-rk.x,enemies[j].y-rk.y)<50){hit=true;break;}
    if(boss&&Math.hypot(boss.x-rk.x,boss.y-rk.y)<70)hit=true;
    if(rk.y<30)hit=true;
    if(hit){
      rk.exploded=true;var rad=75;
      for(var j=enemies.length-1;j>=0;j--){
        if(Math.hypot(enemies[j].x-rk.x,enemies[j].y-rk.y)<rad){
          var e2=enemies[j];
          if(e2.type==='A'){
            ring(e2.x,e2.y,e2.col);score+=e2.pts;enemies.splice(j,1);
          }else{
            var dmg=Math.max(1,Math.floor(e2.maxHp*0.6));
            e2.hp-=dmg;burst(e2.x,e2.y,e2.col,5);
            if(e2.hp<=0){ring(e2.x,e2.y,e2.col);score+=e2.pts;enemies.splice(j,1);}
          }
        }
      }
      if(boss&&Math.hypot(boss.x-rk.x,boss.y-rk.y)<rad+30){boss.hp-=Math.ceil(boss.mhp*.12);if(boss.hp<=0){var rpts=1500+wave*200;score+=rpts;killBoss(rpts);}else burst(boss.x,boss.y,'#f90',10);}
      for(var k=0;k<3;k++)ring(rk.x+(Math.random()-.5)*40,rk.y+(Math.random()-.5)*40,'#f90');
      sPop(true);ft(rk.x,rk.y,'BOOM!','#f90');
    }
  }
}

function drawWinScreen(){
  var cw=W(),ch=H(),px=PX();

  }
  X.fillStyle='rgba(0,0,8,0.75)';X.fillRect(0,0,cw,ch);

      rot:Math.random()*Math.PI*2,rotv:(Math.random()-.5)*.1

  }
  for(var i=winParts.length-1;i>=0;i--){

    wp.rot+=wp.rotv;wp.life--;

    X.globalAlpha=Math.min(1,wp.life/60);X.fillStyle=wp.col;X.save();
    X.translate(wp.x,wp.y);X.rotate(wp.rot);
    X.fillRect(-wp.r,-wp.r,wp.r*2,wp.r*2);X.restore();
  }
  X.globalAlpha=1;

    var fal=Math.min(1,(winTimer-30)/40);

    X.strokeStyle='#ff0';X.lineWidth=px*0.2;X.strokeRect(px*5,px*5,cw-px*10,ch-px*10);

      X.beginPath();X.moveTo(c[0]+c[2]*cb,c[1]);X.lineTo(c[0],c[1]);X.lineTo(c[0],c[1]+c[5]*cb);X.stroke();
    });

  }
  X.textAlign='center';
  var positions=[ch*0.08,ch*0.18,ch*0.30,ch*0.50,ch*0.62,ch*0.74,ch*0.83];
  for(var i=0;i<WIN_LINES.length;i++){
    var ln=WIN_LINES[i];
    var t2=winTimer-ln.delay;
    if(t2<0)continue;
    var targetY=positions[i];
    var slideT=Math.min(1,t2/25);
    var eased=1-Math.pow(1-slideT,3);
    var curY=(-40)+(targetY+40)*eased;
    var txt=ln.txt==='__SCORE__'?score.toLocaleString():ln.txt;
    var fs=Math.floor(cw*ln.size);

  }
  var menuDelay=WIN_LINES[WIN_LINES.length-1].delay+70;

    X.strokeStyle=blink?'#0ff':'#224';X.lineWidth=blink?px*0.8:px*0.3;X.strokeRect(bx,by,bw,bh);
    X.fillStyle=blink?'#0ff':'#446';
    X.font='bold '+Math.floor(cw/26)+'px Courier New';
    X.textAlign='center';X.shadowBlur=blink?8:0;X.shadowColor='#0ff';
    X.fillText('[ ANA MENÜ ]',cw/2,by+bh*0.70);
    X.shadowBlur=0;X.globalAlpha=1;
  }
  drawCRT();

  bullets=[];eBullets=[];enemies=[];parts=[];pups=[];floats=[];rockets=[];spawnQueue=[];spawnTimer=0;pendingGroups=[];
  boss=null;bDir=1;sCool=0;rTimer=0;xTimer=0;rocketReady=0;screenShake=0;
  shieldCd=0;rocketCdA=0;

  paused=false;PB.textContent='⏸';

}

// ── UPDATE ──────────────────────────────────────────────────────
function update(){
  if(state!=='play'||paused)return;
  for(var i=0;i<stars.length;i++){var s=stars[i];s.y+=s.sp;if(s.y>H())s.y=0;s.tw=(s.tw+1)%60;}
  for(var i=0;i<planets.length;i++){var pl=planets[i];pl.y+=pl.sp;if(pl.y>H()+pl.r*2){pl.y=-pl.r*2;pl.x=Math.random()*W();}}
  updateAstronauts();
  if(phase==='launch'){
    launchT--;
    var prog=1-(launchT/420);
    var ease=1-Math.pow(1-Math.min(1,prog*1.2),3);
    for(var i=0;i<stars.length;i++){var s=stars[i];s.y+=s.sp*(1+ease*8);if(s.y>H())s.y=0;s.tw=(s.tw+1)%60;}
    for(var i=0;i<planets.length;i++){var pl=planets[i];pl.y+=pl.sp*(1+ease*5);if(pl.y>H()+pl.r*2){pl.y=-pl.r*2;pl.x=Math.random()*W();}}
    if(launchT<=0){P.x=W()/2;P.y=H()-60;phase='idle';}
    return;
  }
  if(phase==='idle'){phase='countdown';cdN=3;phTimer=80;return;}
  if(phase==='countdown'){
    phTimer--;
    if(phTimer<=0){cdN--;phTimer=60;}
    if(cdN<0){spawnWave(wave);}
    return;
  }
  if(phase==='bossIntro'){introT--;if(introT<=0){spawnBoss();}return;}
  if(phase==='clearing'){
    phTimer--;
    if(phTimer<=0){
      wave++;
      if(wave>MAX_WAVE){state='win';winTimer=0;winParts=[];if(score>highScore)highScore=score;localStorage.setItem('gd_hs',highScore);sWin();return;}
      var nextDef=WAVE_DEFS[Math.min(wave-1,WAVE_DEFS.length-1)];
      if(nextDef&&nextDef.boss&&lives<3){
        lives++;
        ft(W()/2,H()/2-30,'+1 CAN! BOSS YAKLAŞIYOR!','#f55');
      }
      bullets=[];eBullets=[];xTimer=0;resetP();
      waveFlash=150;phase='waveIn';phTimer=160;
    }
    return;
  }
  if(phase==='waveIn'){
    phTimer--;
    if(waveFlash>0)waveFlash--;
    if(phTimer<=0){phase='idle';}
    return;
  }
  if(phase==='bossExploding'){
    for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--;if(p.life<=0)parts.splice(i,1);}
    for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}
    if(parts.length===0&&floats.length===0){
      if(omegaScene===1){omegaT=240;phase='omegaScene';}
      else if(omegaScene===3){if(score>highScore)highScore=score;localStorage.setItem('gd_hs',highScore);state='win';winTimer=0;winParts=[];sWin();}
      else{phase='clearing';phTimer=90;}
    }
    return;
  }
  if(phase==='omegaScene'){
    omegaT--;
    if(omegaT===200)sOmega();
    if(omegaT<=0){
      omegaScene=2;
      if(lives<3){lives++;}
      ft(W()/2,H()/2,'+1 CAN! SON ŞANS!','#f55');
      eBullets=[];bullets=[];pups=[];
      introCfg={name:'OMEGA',col:OMEGA.col,hp:OMEGA.hp,maxHp:OMEGA.hp,design:'omega',pattern:'omega'};
      introT=380;introActive=true;sBossIn();phase='bossIntro';
    }
    return;
  }
  if(warpT>0){warpT--;for(var i=0;i<stars.length;i++)stars[i].sp=20;return;}
  var sp=P.spd*(W()/300);
  if(K.l)P.x=Math.max(P.w/2,P.x-sp);
  if(K.r)P.x=Math.min(W()-P.w/2,P.x+sp);
  if(K.u)P.y=Math.max(P.h/2,P.y-sp);
  if(K.d)P.y=Math.min(H()-P.h/2,P.y+sp);
  if(K.f&&sCool<=0){
    // Mermi hızı: combo arttıkça hızlanır (6 → 10), abartmasız
    var bSpeedBase=6;
    var bSpeedBonus=Math.min(4,combo*0.35);
    var bVY=-(bSpeedBase+bSpeedBonus);
    if(rocketReady){fireRocket();sCool=10;}
    else if(xTimer>0){for(var i=-1;i<=1;i++)bullets.push({x:P.x,y:P.y-P.h/2,vx:i*0.7,vy:bVY});}
    else bullets.push({x:P.x,y:P.y-P.h/2,vx:0,vy:bVY});
    if(!rocketReady)sCool=rTimer>0?8:16;
    sShoot();
  }
  if(sCool>0)sCool--;if(rTimer>0)rTimer--;if(xTimer>0)xTimer--;
  if(P.inv>0)P.inv--;if(P.shld>0)P.shld--;if(cTimer>0)cTimer--;else{combo=0;comboKills=0;comboMultiplier=1;}
  if(shieldCd>0)shieldCd--;
  if(rocketCdA>0)rocketCdA--;
  if(waveFlash>0)waveFlash--;
  if(screenShake>0)screenShake--;
  updateAbilityBtns();
  for(var i=0;i<bullets.length;i++){bullets[i].x+=bullets[i].vx;bullets[i].y+=bullets[i].vy;}
  for(var i=0;i<eBullets.length;i++){eBullets[i].x+=eBullets[i].vx;eBullets[i].y+=eBullets[i].vy;}
  bullets=bullets.filter(function(b){return b.y>-15;});
  eBullets=eBullets.filter(function(b){return b.y<H()+2&&b.x>-30&&b.x<W()+30;});
  var spd2=.35+wave*.015;
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];e.ang=(e.ang||0)+.05;
    // Düşmanı her zaman ekran içinde tut — sınır klamplama
    if(!e.entering){e.x=Math.max(e.w/2+2,Math.min(W()-e.w/2-2,e.x));}
    if(e.entering){var ddx=e.tx-e.x,ddy=e.ty-e.y,dst=Math.sqrt(ddx*ddx+ddy*ddy);if(dst<2.5){e.entering=false;e.x=e.tx;e.y=e.ty;}else{e.x+=ddx/dst*6;e.y+=ddy/dst*6;}}
    else{
      if(e.mv==='side'){e.x+=e.dx*spd2;if(e.x>W()-e.w/2||e.x<e.w/2){e.dx*=-1;e.y+=4;}}
      if(e.mv==='zigzag'){
        e.x+=e.dx*spd2;
        e.zt=(e.zt||0)+1;if(e.zt>30){e.zd*=-1;e.zt=0;}
        e.y+=e.zd*.30+.10;
        // Sert ekran sınırı — C tipi ekranın dışına asla çıkmasın
        if(e.x>W()-e.w*2){e.x=W()-e.w*2;e.dx=-Math.abs(e.dx);}
        if(e.x<e.w*2){e.x=e.w*2;e.dx=Math.abs(e.dx);}
      }
      else if(e.mv==='dive'){e.divePhase=(e.divePhase||0)+1;
        if(e.divePhase<70){e.x+=e.dx*spd2;if(e.x>W()-e.w/2||e.x<e.w/2)e.dx*=-1;}
        else if(e.divePhase<100){var ddx2=P.x-e.x,ddy2=P.y-e.y,dd=Math.sqrt(ddx2*ddx2+ddy2*ddy2)||1;e.x+=ddx2/dd*1.2;e.y+=ddy2/dd*1.2;}
        else if(e.divePhase<150){var ddx3=e.tx-e.x,ddy3=e.ty-e.y,dd2=Math.sqrt(ddx3*ddx3+ddy3*ddy3)||1;e.x+=ddx3/dd2*1.5;e.y+=ddy3/dd2*1.5;}
        else e.divePhase=0;}
      // Y ekran sınırı — oyuncu alanına düşmesin
      if(e.y>H()*0.78){e.y=H()*0.78;e.zd=-Math.abs(e.zd||1);}
      e.st--;
      if(e.st<=0){eBullets.push({x:e.x,y:e.y+e.h/2,vx:(Math.random()-.5)*.5,vy:e.bspd,r:true,et:e.type});e.st=Math.max(65,e.brate)+Math.random()*25;}
    }
  }
  // Düşman-düşman çarpışması — birbirini iter, iç içe girmez
  var eColR=PX()*7; // çarpışma yarıçapı
  for(var i=0;i<enemies.length;i++){
    if(enemies[i].entering)continue;
    for(var j=i+1;j<enemies.length;j++){
      if(enemies[j].entering)continue;
      var edx=enemies[i].x-enemies[j].x;
      var edy=enemies[i].y-enemies[j].y;
      var edist=Math.sqrt(edx*edx+edy*edy);
      if(edist<eColR&&edist>0.1){
        // Normalize ve it
        var push=(eColR-edist)*0.35;
        var enx=edx/edist,eny=edy/edist;
        enemies[i].x+=enx*push;
        enemies[j].x-=enx*push;
        // Y pozisyonunu sadece hafifçe etkile (satır düzenini boz)
        enemies[i].y+=eny*push*0.3;
        enemies[j].y-=eny*push*0.3;
        // dx yönlerini değiştir (birbirinden uzaklaşsın)
        if(edx>0){enemies[i].dx=Math.abs(enemies[i].dx||0.5);enemies[j].dx=-Math.abs(enemies[j].dx||0.5);}
        else{enemies[i].dx=-Math.abs(enemies[i].dx||0.5);enemies[j].dx=Math.abs(enemies[j].dx||0.5);}
      }
    }
  }
  if(boss&&boss.entering){boss.y+=1.2;if(boss.y>=82)boss.entering=false;return;}
  if(boss){
    var bSpd=0.5+Math.floor(wave/5)*0.12;
    boss.x+=bDir*bSpd;
    if(boss.x>W()-boss.w/2||boss.x<boss.w/2)bDir*=-1;
    if(boss.pattern==='omega'){bossShootOmega();}else{bossShoot();}updateLaser();
    for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];
      if(Math.abs(b.x-boss.x)<boss.w/2&&Math.abs(b.y-boss.y)<boss.h/2){boss.hp--;bullets.splice(i,1);burst(b.x,b.y,boss.col,4);
        if(boss.hp<=0){var pts=1800+wave*200;score+=pts;killBoss(pts);}}}
  }
  outer:for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];
    for(var j=enemies.length-1;j>=0;j--){var e=enemies[j];
      if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){
        e.hp--;bullets.splice(i,1);burst(b.x,b.y,e.col,3,2.5);
        if(e.hp<=0){
          addComboKill(e);
          ring(e.x,e.y,e.col);sPop(false);
          dropPup(e);
          enemies.splice(j,1);
        }
        continue outer;
      }
    }
  }
  if(P.inv<=0){for(var i=eBullets.length-1;i>=0;i--){var b=eBullets[i];
    var hit=b.r?Math.hypot(b.x-P.x,b.y-P.y)<P.w/2+3:Math.abs(b.x-P.x)<P.w/2&&Math.abs(b.y-P.y)<P.h/2;
    if(hit){eBullets.splice(i,1);if(P.shld>0){P.shld=0;burst(P.x,P.y,'#0ff',8);}
      else{lives--;P.inv=120;sHit();burst(P.x,P.y,'#4af',10);screenShake=12;if(lives<=0){if(score>highScore)highScore=score;localStorage.setItem('gd_hs',highScore);state='dead';}}break;}}}
  for(var i=pups.length-1;i>=0;i--){
    var pu=pups[i];pu.y+=pu.vy;
    if(pu.y>H()){pups.splice(i,1);continue;}
    if(Math.abs(pu.x-P.x)<22&&Math.abs(pu.y-P.y)<22){
      if(pu.t==='R')rTimer=280;else if(pu.t==='S')P.shld=400;else if(pu.t==='X')xTimer=140;
      else if(pu.t==='H'){if(lives<3){lives++;ft(P.x,P.y-24,'+1 CAN!','#f55');}}
      else if(pu.t==='B')doBomb();
      ring(pu.x,pu.y,'#ff0',5,2.5);sPU();pups.splice(i,1);
    }
  }
  updateRockets();
  processSpawnQueue();
  for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life--;if(p.life<=0)parts.splice(i,1);}
  for(var i=floats.length-1;i>=0;i--){var f=floats[i];f.y+=f.vy;f.life--;if(f.life<=0)floats.splice(i,1);}
  if(enemies.length===0&&spawnQueue.length===0&&pendingGroups.length===0&&!boss&&(phase==='playing'||phase==='bossPlaying')){phase='clearing';phTimer=90;}
  document.getElementById('sEl').textContent=score;
  document.getElementById('wEl').textContent=wave+'/'+MAX_WAVE;
  document.getElementById('lEl').textContent='❤️'.repeat(Math.max(0,lives));
  var pupHTML='';
  if(rTimer>0)pupHTML+='<div class="pupIcon" style="color:#ff0">⚡</div>';
  if(xTimer>0)pupHTML+='<div class="pupIcon" style="color:#0f0">✦</div>';
  if(P.shld>0)pupHTML+='<div class="pupIcon" style="color:#0ff">🛡</div>';
  if(rocketReady)pupHTML+='<div class="pupIcon" style="color:#f90">🚀</div>';
  document.getElementById('activePups').innerHTML=pupHTML;
}

    X.textAlign='center';
    if(omegaT>160){
      var a1=Math.min(1,(240-omegaT)/40);
      X.globalAlpha=a1;X.fillStyle='#f00';X.font='bold '+Math.floor(cw/12)+'px Courier New';
      X.shadowBlur=20;X.shadowColor='#f00';
      X.fillText('BU HENÜZ',cw/2,ch*0.35);X.fillText('BİTMEDİ...',cw/2,ch*0.48);
      X.shadowBlur=0;X.globalAlpha=1;
    }else if(omegaT>60){
      var a2=Math.min(1,(160-omegaT)/30);
      X.globalAlpha=a2;X.fillStyle='#fff';X.font='bold '+Math.floor(cw/16)+'px Courier New';
      X.fillText('KARANLIKTAN',cw/2,ch*0.38);
      X.fillStyle='#f00';X.font='bold '+Math.floor(cw/10)+'px Courier New';
      X.shadowBlur=25;X.shadowColor='#f00';
      X.fillText('OMEGA',cw/2,ch*0.52);X.shadowBlur=0;
      X.fillStyle='#f88';X.font=Math.floor(cw/28)+'px Courier New';
      X.fillText('UYANDIIII !',cw/2,ch*0.62);X.globalAlpha=1;
    }else{
      var fadeOut=omegaT/60;
      X.globalAlpha=fadeOut;X.fillStyle='#f00';X.font='bold '+Math.floor(cw/10)+'px Courier New';
      X.shadowBlur=30;X.shadowColor='#f00';
      X.fillText('OMEGA',cw/2,ch*0.5);X.shadowBlur=0;X.globalAlpha=1;
    }
    X.restore();drawCRT();return;
  }
  if(phase==='bossIntro'){drawBossIntroScreen();return;}

  // Launch phase
  if(phase==='launch'){
    var prog=1-(launchT/420);
    var ease=1-Math.pow(1-Math.min(1,prog*1.2),3);
    var cw2=W(),ch2=H(),p2=PX();
    X.fillStyle='#000';X.fillRect(0,0,cw2,ch2);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var spMul=1+ease*8;
      X.fillStyle='rgba(255,255,255,'+(0.15+0.3*Math.abs(Math.sin(s.tw/60*Math.PI)))+')';
      if(ease>0.3){
        X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;
        X.beginPath();X.moveTo(s.x,s.y);X.lineTo(s.x,s.y+s.sp*spMul*3);X.stroke();
      }else{X.fillRect(Math.floor(s.x),Math.floor(s.y),s.s,s.s);}
    }
    var pR=Math.min(cw2,ch2)*0.28;
    var pYstart=ch2*0.75,pYend=ch2+pR*1.1;
    var pY=pYstart+(pYend-pYstart)*ease,pX=cw2/2;
    X.save();
    X.shadowBlur=pR*0.6;X.shadowColor='#4af';
    var atm=X.createRadialGradient(pX,pY,pR*0.7,pX,pY,pR*1.3);
    atm.addColorStop(0,'rgba(74,111,165,0)');atm.addColorStop(1,'rgba(100,180,255,0.25)');
    X.fillStyle=atm;X.beginPath();X.arc(pX,pY,pR*1.3,0,Math.PI*2);X.fill();
    var grad=X.createRadialGradient(pX-pR*0.3,pY-pR*0.3,pR*0.1,pX,pY,pR);
    grad.addColorStop(0,'#6a9fd8');grad.addColorStop(0.5,'#3a6fa5');grad.addColorStop(1,'#1a3a65');
    X.fillStyle=grad;X.beginPath();X.arc(pX,pY,pR,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    X.fillStyle='#2d7a3a';
    X.beginPath();X.ellipse(pX-pR*0.25,pY-pR*0.15,pR*0.38,pR*0.20,0.4,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(pX+pR*0.32,pY+pR*0.22,pR*0.28,pR*0.14,-0.3,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(220,240,255,0.18)';
    X.beginPath();X.ellipse(pX+pR*0.1,pY-pR*0.4,pR*0.45,pR*0.08,-0.2,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(200,230,255,0.12)';X.beginPath();X.arc(pX-pR*0.3,pY-pR*0.3,pR*0.42,0,Math.PI*2);X.fill();
    X.restore();
    var shipYstart=pY-pR*1.0,shipYend=ch2*0.25;
    P.x=cw2/2;P.y=shipYstart+(shipYend-shipYstart)*ease;
    if(prog<0.9){
      var fy=P.y+p2*5;
      var flen=p2*(6+Math.random()*4)*(1-ease*0.5);
      X.fillStyle='rgba(255,100,0,'+(0.7*(1-ease*0.3))+')';
      X.beginPath();X.moveTo(P.x-p2*2,fy);X.lineTo(P.x,fy+flen*1.2);X.lineTo(P.x+p2*2,fy);X.closePath();X.fill();
      X.fillStyle='rgba(255,220,50,'+(0.9*(1-ease*0.2))+')';
      X.beginPath();X.moveTo(P.x-p2*1,fy);X.lineTo(P.x,fy+flen*0.7);X.lineTo(P.x+p2*1,fy);X.closePath();X.fill();
      X.fillStyle='rgba(255,255,255,0.9)';
      X.beginPath();X.moveTo(P.x-p2*0.4,fy);X.lineTo(P.x,fy+flen*0.3);X.lineTo(P.x+p2*0.4,fy);X.closePath();X.fill();
      if(Math.random()<0.6){
        parts.push({x:P.x+(Math.random()-.5)*p2*5,y:fy+flen*0.5+Math.random()*p2*3,
          vx:(Math.random()-.5)*1.5,vy:Math.random()*2+1,
          life:30+Math.random()*20,col:'rgba(180,120,60,0.5)',r:p2*(Math.random()*2+0.8)});
      }
    }
    for(var i=parts.length-1;i>=0;i--){
      var pt=parts[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.05;pt.life--;
      if(pt.life<=0){parts.splice(i,1);continue;}
      X.globalAlpha=pt.life/45;X.fillStyle=pt.col;
      X.beginPath();X.arc(Math.floor(pt.x),Math.floor(pt.y),pt.r,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
    drawShip();
    X.textAlign='center';
    if(prog<0.35){
      X.globalAlpha=Math.min(1,prog*5);X.fillStyle='#0ff';X.font='bold '+Math.floor(cw2/18)+'px Courier New';
      X.shadowBlur=12;X.shadowColor='#0ff';X.fillText('GALAKSİYİ KORU!',cw2/2,ch2*0.18);X.shadowBlur=0;X.globalAlpha=1;
    }else if(prog>0.7){
      X.globalAlpha=Math.min(1,(prog-0.7)*3.3);X.fillStyle='#ff0';X.font='bold '+Math.floor(cw2/22)+'px Courier New';
      X.shadowBlur=10;X.shadowColor='#ff0';X.fillText('DÜŞMANLAR GELİYOR!',cw2/2,ch2*0.18);X.shadowBlur=0;X.globalAlpha=1;
    }
    drawCRT();return;
  }
  if(phase==='waveIn'){
    drawStars();
    if(waveFlash>0){
      var wt2=waveFlash/150;
      var isBF=(WAVE_DEFS[Math.min(wave-1,WAVE_DEFS.length-1)]||{}).boss;
      var wC=isBF?'#f80':'#0ff';
      var px5=PX();
      var txt2='DALGA '+wave;
      var xP2;
      if(wt2>0.6){xP2=cw*((1-wt2)/0.4-1);}
      else if(wt2>0.3){xP2=0;}
      else{xP2=cw*(1-(wt2/0.3));}
      var al2=wt2>0.6?Math.min(1,(1-wt2)*5):wt2>0.3?1:Math.min(1,wt2*5);
      var fs2=Math.floor(cw/5.5);
      var gl2=Math.random()<0.3?Math.floor(Math.random()*6)-3:0;
      X.save();X.globalAlpha=al2;X.textAlign='center';
      X.font='bold '+fs2+'px Courier New';
      X.fillStyle='rgba(255,0,0,0.5)';X.fillText(txt2,cw/2+xP2-3+gl2,ch/2+3);
      X.fillStyle='rgba(0,200,255,0.5)';X.fillText(txt2,cw/2+xP2+3-gl2,ch/2-3);
      X.fillStyle=wC;X.fillText(txt2,cw/2+xP2,ch/2);
      X.font='bold '+Math.floor(cw/24)+'px Courier New';
      if(isBF){X.fillStyle='#ff0';X.fillText('⚠  BOSS DALGASI  ⚠',cw/2+xP2,ch/2+fs2*0.75);}
      else{X.fillStyle='rgba(255,255,255,0.7)';X.fillText('[ '+wave+' / '+MAX_WAVE+' ]',cw/2+xP2,ch/2+fs2*0.75);}
      for(var gi2=0;gi2<3;gi2++){
        var gy2=ch/2-fs2*0.6+Math.random()*fs2*1.2;
        X.fillStyle='rgba(255,255,255,'+(Math.random()*0.15)+')';
        X.fillRect(Math.random()*cw*0.3,gy2,cw*0.4+Math.random()*cw*0.3,px5);
      }
      X.restore();
    }
    drawCRT();return;
  }
  drawStars();
  // Ekran titremesi
  if(screenShake>0){
    var sx=Math.floor((Math.random()-.5)*screenShake*1.5);
    var sy=Math.floor((Math.random()-.5)*screenShake*1.5);
    X.save();X.translate(sx,sy);
  }
  if(paused){    X.fillStyle='rgba(0,0,0,.65)';X.fillRect(0,0,cw,ch);
    X.textAlign='center';X.fillStyle='#ff0';X.font='bold '+Math.floor(cw/10)+'px Courier New';
    X.shadowBlur=12;X.shadowColor='#ff0';X.fillText('DURAKLADI',cw/2,ch/2);X.shadowBlur=0;
    X.fillStyle='#aff';X.font=Math.floor(cw/28)+'px Courier New';X.fillText('⏸ butonuna bas',cw/2,ch/2+42);
    drawCRT();return;
  }
  for(var i=0;i<enemies.length;i++)drawEnemySprite(enemies[i]);
  drawBoss();

  // Boss health bar — ekranın üstünde, sprite'ın üstünde değil
  if(boss&&!boss.entering)drawBossHealthBar();

  for(var i=0;i<pups.length;i++)drawPup(pups[i]);
  var rpx=PX();
  for(var i=0;i<rockets.length;i++){
    var rk=rockets[i];
    if(!rk.exploded){
      X.fillStyle='#f90';X.shadowBlur=12;X.shadowColor='#f90';
      X.fillRect(Math.floor(rk.x-rpx*1.5),Math.floor(rk.y-rpx*4),rpx*3,rpx*6);
      X.fillStyle='#ff0';X.fillRect(Math.floor(rk.x-rpx),Math.floor(rk.y-rpx*6),rpx*2,rpx*2);
      X.fillStyle='#f55';X.fillRect(Math.floor(rk.x-rpx*3),Math.floor(rk.y),rpx*2,rpx*3);X.fillRect(Math.floor(rk.x+rpx),Math.floor(rk.y),rpx*2,rpx*3);
      var rfl=Math.floor(Date.now()/60)%2;X.fillStyle=rfl?'#ff0':'#f84';X.fillRect(Math.floor(rk.x-rpx),Math.floor(rk.y+rpx*2),rpx*2,rpx*2);
      X.shadowBlur=0;
      X.strokeStyle='rgba(255,150,0,.3)';X.lineWidth=2;X.beginPath();X.arc(rk.x,rk.y,75,0,Math.PI*2);X.stroke();
    }else{
      var ep=rk.timer/30;
      X.strokeStyle='rgba(255,150,0,'+(1-ep)+')';X.lineWidth=3;X.beginPath();X.arc(rk.x,rk.y,75*ep,0,Math.PI*2);X.stroke();
      X.fillStyle='rgba(255,200,0,'+(0.35*(1-ep))+')';X.beginPath();X.arc(rk.x,rk.y,35*ep,0,Math.PI*2);X.fill();
    }
  }
  X.shadowBlur=0;
  for(var i=0;i<bullets.length;i++){drawPlayerBullet(bullets[i]);}
  X.shadowBlur=0;

  // Düşman/Boss mermileri
  for(var i=0;i<eBullets.length;i++){
    var b=eBullets[i];
    var bx2=Math.floor(b.x),by2=Math.floor(b.y);
    if(b.bt){
      if(b.bt==='warden_fire'||b.bt==='warden_aimed'){drawWardenFireball(b);}
      else if(b.bt==='crusher_web'){drawWebBullet(b);}
      else if(b.bt==='nemesis_star'||b.bt==='nemesis_aimed'){drawNemesisBullet(b);}
      else if(b.bt==='omega_chaos'||b.bt==='omega_aimed'){drawOmegaBullet(b);}
    }else if(b.r){
      var p=PX();
      X.save();X.translate(bx2,by2);
      if(b.et==='A'){
        X.fillStyle='#4af';X.shadowBlur=7;X.shadowColor='#4af';
        X.fillRect(-p*2,-p*0.4,p*4,p*0.8);X.fillRect(-p*0.4,-p*2,p*0.8,p*4);
        X.fillStyle='#fff';X.beginPath();X.arc(0,0,p*0.5,0,Math.PI*2);X.fill();
      }else if(b.et==='B'){
        X.fillStyle='#f44';X.shadowBlur=8;X.shadowColor='#f44';
        X.beginPath();X.moveTo(0,p*2.5);X.lineTo(p*1.2,-p*1.2);X.lineTo(0,-p*0.3);X.lineTo(-p*1.2,-p*1.2);X.closePath();X.fill();
        X.fillStyle='rgba(255,180,180,0.7)';X.beginPath();X.arc(0,p*0.5,p*0.4,0,Math.PI*2);X.fill();
      }else if(b.et==='C'){
        X.fillStyle='#b0f';X.shadowBlur=8;X.shadowColor='#b0f';
        X.beginPath();X.moveTo(0,p*2);X.lineTo(p*1.4,-p*1.2);X.lineTo(-p*1.4,-p*1.2);X.closePath();X.fill();
        X.fillStyle='rgba(224,170,255,0.7)';X.beginPath();X.arc(0,p*0.3,p*0.45,0,Math.PI*2);X.fill();
      }else{
        X.fillStyle='#f80';X.shadowBlur=10;X.shadowColor='#f80';
        X.beginPath();X.arc(0,0,p*1.3,0,Math.PI*2);X.fill();
        X.fillStyle='#ff0';X.beginPath();X.arc(0,0,p*0.7,0,Math.PI*2);X.fill();
        X.fillStyle='rgba(255,255,255,0.8)';X.beginPath();X.arc(-p*0.35,-p*0.35,p*0.3,0,Math.PI*2);X.fill();
      }
      X.shadowBlur=0;X.restore();
    }
  }
  for(var i=0;i<parts.length;i++){var p=parts[i];X.globalAlpha=Math.min(1,p.life/46);X.fillStyle=p.col;X.fillRect(Math.floor(p.x-p.r/2),Math.floor(p.y-p.r/2),Math.ceil(p.r),Math.ceil(p.r));}
  X.globalAlpha=1;
  if(phase!=='bossExploding'&&(P.inv<=0||Math.floor(P.inv/6)%2===0))drawShip();

  // Countdown — boss dalgalarında direkt oyna (geri sayım yok)
  if(phase==='countdown'){
    var isBossW=(WAVE_DEFS[Math.min(wave-1,WAVE_DEFS.length-1)]||{}).boss;
    if(!isBossW){
      X.fillStyle='rgba(0,0,0,.45)';X.fillRect(0,0,cw,ch);X.textAlign='center';
      X.fillStyle='#ff0';X.font='bold '+Math.floor(cw/4)+'px Courier New';
      X.shadowBlur=24;X.shadowColor='#ff0';
      X.fillText(cdN>0?cdN:'GO!',cw/2,ch/2+20);X.shadowBlur=0;
    }
    // Boss dalgasında geri sayım YOK — direkt spawn'a gidecek
  }

  // Wave flash
  if(waveFlash>0){
    var wt=waveFlash/150;
    var isBossFlash=(WAVE_DEFS[Math.min(wave-1,WAVE_DEFS.length-1)]||{}).boss;
    var wCol=isBossFlash?'#f80':'#0ff';
    var px4=PX();
    var txt='DALGA '+wave;
    var xPos;
    if(wt>0.6){xPos=cw*((1-wt)/0.4-1);}
    else if(wt>0.3){xPos=0;}
    else{xPos=cw*(1-(wt/0.3));}
    var alpha=wt>0.6?Math.min(1,(1-wt)*5):wt>0.3?1:Math.min(1,wt*5);
    X.save();X.globalAlpha=alpha;X.textAlign='center';
    var fs=Math.floor(cw/5.5);
    X.font='bold '+fs+'px Courier New';
    var glitch=Math.random()<0.3?Math.floor(Math.random()*6)-3:0;
    X.fillStyle='rgba(255,0,0,0.5)';X.fillText(txt,cw/2+xPos-3+glitch,ch/2+3);
    X.fillStyle='rgba(0,200,255,0.5)';X.fillText(txt,cw/2+xPos+3-glitch,ch/2-3);
    X.fillStyle=wCol;X.fillText(txt,cw/2+xPos,ch/2);
    X.font='bold '+Math.floor(cw/24)+'px Courier New';
    X.fillStyle='rgba(255,255,255,0.7)';
    if(isBossFlash){X.fillStyle='#ff0';X.fillText('⚠  BOSS DALGASI  ⚠',cw/2+xPos,ch/2+fs*0.75);}
    else{X.fillText('[ DALGA '+wave+' / '+MAX_WAVE+' ]',cw/2+xPos,ch/2+fs*0.75);}
    for(var gi=0;gi<3;gi++){
      var gy=ch/2-fs*0.6+Math.random()*fs*1.2;
      X.fillStyle='rgba(255,255,255,'+(Math.random()*0.15)+')';
      X.fillRect(Math.random()*cw*0.3,gy,cw*0.4+Math.random()*cw*0.3,px4);
    }
    X.restore();
  }

  // Float texts
  for(var i=0;i<floats.length;i++){
    var f=floats[i];X.globalAlpha=f.life/60;X.fillStyle=f.col;
    X.font='bold '+Math.floor(W()/26)+'px Courier New';X.textAlign='center';
    X.fillText(f.txt,f.x,f.y);
  }
  X.globalAlpha=1;

  if(phase==='clearing'&&phTimer>50&&warpT<=0){
    var cp=Math.min(1,(180-phTimer)/20);
    X.globalAlpha=cp>0.9?Math.max(0,(phTimer-50)/40):cp;
    X.fillStyle='#ff0';X.font='bold '+Math.floor(W()/16)+'px Courier New';X.textAlign='center';
    X.shadowBlur=14;X.shadowColor='#ff0';
    X.fillText('DALGA '+wave+' BİTTİ!',W()/2,H()/2-20);
    X.font=Math.floor(W()/30)+'px Courier New';
    X.fillStyle='#0ff';X.shadowColor='#0ff';X.shadowBlur=8;
    X.fillText('SKOR: '+score.toLocaleString(),W()/2,H()/2+25);
    X.shadowBlur=0;X.globalAlpha=1;
  }
  if(phase==='bossExploding'){
    var blink=Math.floor(Date.now()/120)%2===0;
    if(blink){X.fillStyle='#ff0';X.font='bold '+Math.floor(W()/14)+'px Courier New';X.textAlign='center';X.shadowBlur=16;X.shadowColor='#ff0';X.fillText('BOSS YIKILDI!',W()/2,H()/2);X.shadowBlur=0;}
  }

  // Combo HUD — sol üst köşe pixel panel
  if(combo>=2&&cTimer>0){
    var comboAlpha=Math.min(1,cTimer/20);
    var comboCol=combo>=10?'#f00':combo>=6?'#f0f':combo>=4?'#ff0':'#fa0';
    var px6=PX();
    var panelW=px6*18,panelH=px6*7;
    var panelX=px6*2,panelY=px6*2;
    X.globalAlpha=comboAlpha*0.85;
    X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(panelX,panelY,panelW,panelH);
    X.fillStyle=comboCol;
    X.fillRect(panelX,panelY,px6,px6);X.fillRect(panelX+panelW-px6,panelY,px6,px6);
    X.fillRect(panelX,panelY+panelH-px6,px6,px6);X.fillRect(panelX+panelW-px6,panelY+panelH-px6,px6,px6);
    X.fillStyle=ca(comboCol,0.5);
    X.fillRect(panelX+px6,panelY,panelW-px6*2,Math.ceil(px6/2));
    X.fillRect(panelX+px6,panelY+panelH-Math.ceil(px6/2),panelW-px6*2,Math.ceil(px6/2));
    X.fillRect(panelX,panelY+px6,Math.ceil(px6/2),panelH-px6*2);
    X.fillRect(panelX+panelW-Math.ceil(px6/2),panelY+px6,Math.ceil(px6/2),panelH-px6*2);
    X.globalAlpha=comboAlpha;
    X.fillStyle=comboCol;X.shadowBlur=combo>=6?10:4;X.shadowColor=comboCol;
    X.font='bold '+Math.floor(px6*3)+'px Courier New';X.textAlign='center';
    X.fillText('x'+combo,panelX+panelW/2,panelY+px6*3.2);
    X.font=Math.floor(px6*1.5)+'px Courier New';
    X.fillStyle='rgba(255,255,255,0.7)';X.shadowBlur=0;
    X.fillText('×'+comboMultiplier+' PUAN',panelX+panelW/2,panelY+px6*5.5);
    X.shadowBlur=0;X.globalAlpha=1;
  }
  X.textAlign='left';
  if(screenShake>0)X.restore();
  drawCRT();
}

// ── LOOP ──────────────────────────────────────────────────────────
var _rafId=null;
function loop(){_rafId=requestAnimationFrame(loop);update();draw();}
function go(){
  if(state==='start'){state='play';phase='launch';launchT=420;startMusic();}
  else if(state==='dead'){resetAll();state='play';}
}
// Sekme gizlenince loop'u durdur, geri gelince devam ettir
document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(_rafId){cancelAnimationFrame(_rafId);_rafId=null;}}
  else{if(!_rafId)loop();}
});
loop();
</script>
</body>
</html>
